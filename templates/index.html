<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>마사마사와 한국어 수다</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#FF8C5A">
    <!-- iOS 홈 화면 설치용 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="마사마사">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <style>
        :root {
            --bg: #FFF8F0; --panel: #FFFFFF; --ink: #3D2C26; --muted: #B8A99E;
            --accent: #FF8C5A; --accent-soft: #FFE0CC; --navy: #3D5A80;
            --navy-soft: #E3EAF2; --danger: #E76F51;
            --kakao-bg: #BACEE0; --kakao-yellow: #FEE500;
            --shadow: 0 8px 30px -10px rgba(61, 44, 38, 0.18);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .app { width: 100%; max-width: 1060px; display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: stretch; }
        @media (max-width: 820px) { .app { grid-template-columns: 1fr; } }

        /* ── 왼쪽 패널 ── */
        .character-panel { background: var(--panel); border-radius: 24px; box-shadow: var(--shadow); padding: 20px 18px; display: flex; flex-direction: column; align-items: center; gap: 10px; overflow-y: auto; max-height: 92vh; }
        .title { text-align: center; }
        .title h1 { font-size: 16px; font-weight: 800; margin: 0 0 2px; }
        .title p { font-size: 11px; color: var(--muted); margin: 0; line-height: 1.4; }

        .stage { width: 100%; aspect-ratio: 1/1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 20px; }
        .stage-glow { position: absolute; inset: 0; border-radius: 20px; background: radial-gradient(circle at 50% 60%, var(--accent-soft), transparent 75%); opacity: 0.4; transition: opacity 0.4s, background 0.4s; }
        .stage.speaking .stage-glow { opacity: 0.9; }
        .stage.surprised .stage-glow { background: radial-gradient(circle at 50% 60%, #FFD6D6, transparent 75%); opacity: 1; }
        .stage.paused .stage-glow { background: radial-gradient(circle at 50% 60%, #E0E0E0, transparent 75%); }

        .hamster-wrap { position: relative; width: 88%; z-index: 1; transform-origin: 50% 92%; animation: breathe 3.2s ease-in-out infinite; }
        #hamster { width: 100%; display: block; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015) translateY(-1px); } }
        .stage.listening .hamster-wrap { animation: tilt 2.2s ease-in-out infinite; }
        @keyframes tilt { 0%, 100% { transform: rotate(0deg); } 30% { transform: rotate(-2.2deg); } 70% { transform: rotate(1.6deg); } }
        .stage.speaking .hamster-wrap { animation: talk-bounce 0.45s ease-in-out infinite; }
        @keyframes talk-bounce { 0%, 100% { transform: translateY(0) scale(var(--talk-scale, 1)); } 50% { transform: translateY(-5px) scale(var(--talk-scale, 1)); } }
        .stage.surprised .hamster-wrap { animation: shake 0.4s ease-in-out 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-1.5deg); } 75% { transform: translateX(5px) rotate(1.5deg); } }
        .stage.paused .hamster-wrap { animation: none; filter: grayscale(0.5); opacity: 0.75; }

        .emote { position: absolute; font-size: 32px; z-index: 2; pointer-events: none; animation: float-up 1.4s ease-out forwards; }
        @keyframes float-up { 0% { opacity: 0; transform: translateY(10px) scale(0.5); } 20% { opacity: 1; transform: translateY(-6px) scale(1.15); } 100% { opacity: 0; transform: translateY(-60px) scale(1); } }

        .speech-indicator { position: absolute; top: 5%; right: 7%; z-index: 2; background: #fff; border-radius: 14px; padding: 6px 12px; font-size: 12px; font-weight: 700; box-shadow: 0 3px 10px rgba(0,0,0,0.12); opacity: 0; transition: opacity 0.25s; }
        .stage.speaking .speech-indicator { opacity: 1; }
        .speech-indicator::after { content: ""; position: absolute; bottom: -6px; left: 16px; border: 7px solid transparent; border-top-color: #fff; border-bottom: 0; }

        .pause-overlay { position: absolute; inset: 0; z-index: 3; display: none; align-items: center; justify-content: center; font-size: 54px; background: rgba(255,255,255,0.35); border-radius: 20px; }
        .stage.paused .pause-overlay { display: flex; }

        .status { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--navy); }
        .status .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); transition: background 0.25s, box-shadow 0.25s; }
        .status .dot.listening { background: var(--navy); box-shadow: 0 0 0 4px var(--navy-soft); }
        .status .dot.speaking { background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); animation: pulse 0.9s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

        /* ── 페이더 섹션 ── */
        .fader-section { width: 100%; background: #F8F5F1; border-radius: 16px; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
        .fader-section .section-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .fader-group { display: flex; flex-direction: column; gap: 4px; }
        .fader-header { display: flex; justify-content: space-between; align-items: center; }
        .fader-label { font-size: 12px; font-weight: 700; color: var(--ink); }
        .fader-value { font-size: 11px; font-weight: 800; color: var(--navy); background: var(--navy-soft); border-radius: 8px; padding: 2px 8px; min-width: 90px; text-align: center; }
        .fader-row { display: flex; align-items: center; gap: 8px; }
        .fader-row .end-label { font-size: 10px; color: var(--muted); white-space: nowrap; min-width: 36px; }
        .fader-row .end-label:last-child { text-align: right; }
        input[type="range"] { -webkit-appearance: none; appearance: none; flex: 1; height: 6px; border-radius: 3px; background: #E0D8D0; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2.5px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.18); }
        #distSlider::-webkit-slider-thumb { background: var(--accent); }
        #powerSlider::-webkit-slider-thumb { background: var(--navy); }

        /* ── 컨트롤 바 ── */
        .control-bar { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; }
        .ctrl-btn { border: none; background: var(--navy-soft); color: var(--navy); border-radius: 10px; width: 40px; height: 36px; font-size: 15px; cursor: pointer; transition: transform 0.12s, background 0.2s; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { transform: translateY(-1px); background: #D2DEEC; }
        .ctrl-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
        .ctrl-btn.pause-active { background: var(--accent-soft); }
        .speed-label { font-size: 11px; font-weight: 800; color: var(--navy); min-width: 40px; text-align: center; background: var(--navy-soft); border-radius: 8px; padding: 5px 0; }

        .quick-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; }
        .quick-btn { border: 1.5px solid var(--accent-soft); background: #FFF6F0; color: var(--accent); border-radius: 12px; padding: 8px 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: transform 0.12s, background 0.2s; white-space: nowrap; }
        .quick-btn:hover:not(:disabled) { transform: translateY(-1px); background: var(--accent-soft); }
        .quick-btn:active:not(:disabled) { transform: scale(0.96); }
        .quick-btn:disabled { opacity: 0.35; cursor: default; }

        .action-btn { width: 100%; border: none; border-radius: 999px; padding: 12px 18px; font-size: 13px; font-weight: 800; color: #fff; background: var(--navy); cursor: pointer; transition: transform 0.15s, background 0.2s; box-shadow: 0 6px 16px -6px rgba(61,90,128,0.55); }
        .action-btn:hover { transform: translateY(-1px); }
        .action-btn.recording { background: var(--danger); }
        .main-controls { display: flex; gap: 8px; width: 100%; }
        .main-controls .action-btn { flex: 1; width: auto; }
        .pause-btn { background: var(--navy-soft); color: var(--navy); box-shadow: none; }
        .pause-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
        .pause-btn.pause-active { background: var(--accent); color: #fff; }
        .export-btn { width: 100%; border: 1.5px solid var(--navy); border-radius: 999px; padding: 9px 18px; font-size: 12px; font-weight: 800; color: var(--navy); background: transparent; cursor: pointer; transition: background 0.2s; }
        .export-btn:hover { background: var(--navy-soft); }
        .export-btn:disabled { opacity: 0.35; cursor: default; }

        /* ── 채팅 패널 ── */
        .chat-panel { background: var(--kakao-bg); border-radius: 24px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 540px; max-height: 92vh; overflow: hidden; }
        .chat-header { padding: 12px 16px; background: rgba(255,255,255,0.55); backdrop-filter: blur(6px); display: flex; align-items: center; gap: 10px; }
        .chat-header .avatar { width: 36px; height: 36px; border-radius: 13px; overflow: hidden; flex-shrink: 0; background: #fff; }
        .chat-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header .info h2 { font-size: 14px; font-weight: 800; margin: 0; }
        .chat-header .info span { font-size: 11px; color: #6B7A8A; }
        .chat-log { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-log::-webkit-scrollbar { width: 5px; }
        .chat-log::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
        .empty-state { margin: auto; text-align: center; color: #5A6B7B; font-size: 13px; line-height: 1.7; }
        .empty-state .emoji { font-size: 32px; display: block; margin-bottom: 10px; }
        .msg-row { display: flex; align-items: flex-end; gap: 6px; }
        .msg-row.user { flex-direction: row-reverse; }
        .msg-row .profile { width: 32px; height: 32px; border-radius: 12px; overflow: hidden; flex-shrink: 0; align-self: flex-start; background: #fff; }
        .msg-row .profile img { width: 100%; height: 100%; object-fit: cover; }
        .msg-group { display: flex; flex-direction: column; gap: 3px; max-width: 72%; }
        .msg-row.user .msg-group { align-items: flex-end; }
        .sender-name { font-size: 11px; color: #4A5A6A; margin-bottom: 2px; padding-left: 2px; }
        .bubble { padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; box-shadow: 0 1px 1px rgba(0,0,0,0.06); }
        .msg-row.ai .bubble { background: #FFFFFF; border-top-left-radius: 4px; }
        .msg-row.user .bubble { background: var(--kakao-yellow); color: #1A1A1A; border-top-right-radius: 4px; }
        .bubble.interrupted-mark { opacity: 0.6; text-decoration: line-through; }
        .chat-footer { padding: 8px 14px; background: rgba(255,255,255,0.55); font-size: 11px; color: #5A6B7B; text-align: center; }
    </style>
</head>
<body>
<div class="app">
    <div class="character-panel">
        <div class="title">
            <h1>🐹 마사마사와 한국어 수다</h1>
            <p>마이크를 켜고 마사마사와 자연스럽게 대화해 보세요</p>
        </div>
        <div class="stage" id="stage">
            <div class="stage-glow"></div>
            <div class="hamster-wrap" id="hamsterWrap">
                <img id="hamster" src="/static/hamster.png" alt="마사마사">
            </div>
            <div class="speech-indicator">말하는 중...</div>
            <div class="pause-overlay">⏸️</div>
        </div>
        <div class="status">
            <span class="dot idle" id="statusDot"></span>
            <span id="statusText">연결 준비 완료</span>
        </div>

        <!-- 페이더 섹션 -->
        <div class="fader-section">
            <p class="section-title">🎚️ 대화 스타일 조절</p>
            <div class="fader-group">
                <div class="fader-header">
                    <span class="fader-label">친밀도 (Distance)</span>
                    <span class="fader-value" id="distValue">70 · 친한 사이</span>
                </div>
                <div class="fader-row">
                    <span class="end-label">낯선 사이</span>
                    <input type="range" id="distSlider" min="0" max="100" value="70" step="1">
                    <span class="end-label">절친</span>
                </div>
            </div>
            <div class="fader-group">
                <div class="fader-header">
                    <span class="fader-label">사용자 지위 (Power)</span>
                    <span class="fader-value" id="powerValue">50 · 대등한 관계</span>
                </div>
                <div class="fader-row">
                    <span class="end-label">하급자</span>
                    <input type="range" id="powerSlider" min="0" max="100" value="50" step="1">
                    <span class="end-label">상급자</span>
                </div>
            </div>
        </div>

        <!-- 빠른 요청 (마사마사에게 말 거는 단축 버튼) -->
        <div class="quick-bar">
            <button class="quick-btn" data-say="조금만 천천히 말해 줄래요?" disabled>🐢 천천히</button>
            <button class="quick-btn" data-say="방금 뭐라고 했어요? 다시 한 번만 말해 주세요." disabled>🔁 다시 한 번</button>
            <button class="quick-btn" data-say="더 쉬운 말로 바꿔서 말해 줄래요?" disabled>💡 쉽게</button>
            <button class="quick-btn" data-say="이제 편하게 평소 속도로 말해도 돼요!" disabled>🐇 빨리빨리</button>
        </div>

        <input type="text" id="accessCodeInput" placeholder="접속 코드 (필요한 경우에만 입력)" style="width:100%; box-sizing:border-box; padding:9px 12px; border-radius:10px; border:1px solid var(--accent-soft); font-size:12px; background:#fff; color:var(--ink);">
        <div class="main-controls">
            <button id="actionBtn" class="action-btn">대화 시작하기</button>
            <button id="pauseBtn" class="action-btn pause-btn" disabled>⏸️ 일시정지</button>
        </div>
        <button id="exportBtn" class="export-btn" disabled>📄 대화 내보내기 (.txt)</button>
    </div>
    <div class="chat-panel">
        <div class="chat-header">
            <div class="avatar"><img src="/static/hamster.png" alt=""></div>
            <div class="info"><h2>마사마사</h2><span id="headerStatus">대기 중</span></div>
        </div>
        <div class="chat-log" id="chatLog">
            <div class="empty-state" id="emptyState">
                <span class="emoji">🐹</span>대화를 시작하면<br>카카오톡처럼 대화가 표시됩니다
            </div>
        </div>
        <div class="chat-footer">한국어로 자유롭게 말해보세요 · 마사마사가 말하는 중에 끼어들어도 됩니다</div>
    </div>
</div>
<script>
    let ws = null, audioContext = null, processor = null, mediaStream = null, isConnected = false;
    let isPaused = false;
    let playbackRate = 1.0;
    let nextPlayTime = 0;
    let activeSources = [];
    let currentUserBubble = null, currentAiBubble = null;
    let surpriseTimer = null;
    let lastEmoteAt = 0;
    let transcriptLog = [];
    let sessionStartedAt = null;

    const actionBtn = document.getElementById("actionBtn");
    const exportBtn = document.getElementById("exportBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const headerStatus = document.getElementById("headerStatus");
    const stage = document.getElementById("stage");
    const hamsterWrap = document.getElementById("hamsterWrap");
    const chatLog = document.getElementById("chatLog");
    let emptyState = document.getElementById("emptyState");

    const distSlider = document.getElementById("distSlider");
    const powerSlider = document.getElementById("powerSlider");
    const distValue = document.getElementById("distValue");
    const powerValue = document.getElementById("powerValue");

    actionBtn.addEventListener("click", () => isConnected ? stopSession() : startSession());
    exportBtn.addEventListener("click", exportTranscript);
    pauseBtn.addEventListener("click", togglePause);

    /* ── 페이더 라벨 업데이트 ── */
    function getDistLabel(v) {
        if (v <= 15) return v + " · 낯선 사이";
        if (v <= 35) return v + " · 아는 사이";
        if (v <= 65) return v + " · 적당한 사이";
        if (v <= 85) return v + " · 친한 사이";
        return v + " · 절친 (BFF)";
    }
    function getPowerLabel(v) {
        if (v <= 15) return v + " · 하급자";
        if (v <= 35) return v + " · 약간 아래";
        if (v <= 65) return v + " · 대등한 관계";
        if (v <= 85) return v + " · 약간 위";
        return v + " · 상급자 (VIP)";
    }
    distSlider.addEventListener("input", () => { distValue.textContent = getDistLabel(+distSlider.value); });
    powerSlider.addEventListener("input", () => { powerValue.textContent = getPowerLabel(+powerSlider.value); });

    function togglePause() {
        if (!isConnected || !audioContext) return;
        isPaused = !isPaused;
        if (isPaused) {
            audioContext.suspend();
            stage.classList.add("paused");
            pauseBtn.textContent = "▶️ 재개";
            pauseBtn.classList.add("pause-active");
            setStatus("idle", "일시정지됨 — ▶️ 누르면 재개");
        } else {
            audioContext.resume();
            stage.classList.remove("paused");
            pauseBtn.textContent = "⏸️ 일시정지";
            pauseBtn.classList.remove("pause-active");
            setStatus("listening", "듣고 있어요... (마이크 활성)");
        }
    }

    const quickBtns = document.querySelectorAll(".quick-btn");
    quickBtns.forEach(btn => btn.addEventListener("click", () => sendQuickPhrase(btn.dataset.say)));

    function setControlsEnabled(on) {
        pauseBtn.disabled = !on;
        quickBtns.forEach(b => b.disabled = !on);
    }

    function sendQuickPhrase(text) {
        if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN || !text) return;
        ws.send(JSON.stringify({ type: "text", text: text }));
        addInstantUserBubble(text);
    }

    function addInstantUserBubble(text) {
        if (emptyState) { emptyState.remove(); emptyState = null; }
        finalizeBubbles();
        const row = document.createElement("div");
        row.className = "msg-row user";
        const group = document.createElement("div");
        group.className = "msg-group";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        group.appendChild(bubble);
        row.appendChild(group);
        chatLog.appendChild(row);
        chatLog.scrollTop = chatLog.scrollHeight;
        transcriptLog.push({
            role: "user", text: text,
            time: new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
            interrupted: false
        });
    }

    function startSession() {
        setStatus("connecting", "서버 연결 중...");
        const d = +distSlider.value;
        const p = +powerSlider.value;
        distSlider.disabled = true;
        powerSlider.disabled = true;
        const proto = location.protocol === "https:" ? "wss://" : "ws://";
        const code = encodeURIComponent(document.getElementById("accessCodeInput").value.trim());
        ws = new WebSocket(proto + location.host + "/ws/live?d=" + d + "&p=" + p + "&code=" + code);
        ws.onopen = async () => {
            setStatus("listening", "듣고 있어요... (마이크 활성)");
            actionBtn.innerText = "대화 종료하기";
            actionBtn.classList.add("recording");
            isConnected = true;
            isPaused = false;
            nextPlayTime = 0;
            transcriptLog = [];
            sessionStartedAt = new Date();
            exportBtn.disabled = true;
            setControlsEnabled(true);
            pauseBtn.textContent = "⏸️ 일시정지";
            await initAudioCapture();
        };
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === "audio") {
                playReceivedPCM(msg.data);
                if (typeof msg.volume === "number") {
                    hamsterWrap.style.setProperty("--talk-scale", (1 + msg.volume * 0.06).toFixed(3));
                }
                if (!isPaused) setStatus("speaking", "마사마사가 말하고 있어요");
            } else if (msg.type === "user_text") {
                appendTranscript("user", msg.text);
            } else if (msg.type === "ai_text") {
                appendTranscript("ai", msg.text);
                detectEmotion(msg.text);
            } else if (msg.type === "turn_complete") {
                finalizeBubbles();
                hamsterWrap.style.setProperty("--talk-scale", "1");
                if (!isPaused) setStatus("listening", "듣고 있어요... (마이크 활성)");
            } else if (msg.type === "interrupted") {
                stopAllAudio();
                if (currentAiBubble) {
                    currentAiBubble.el.classList.add("interrupted-mark");
                    flushBubble(currentAiBubble, "ai", true);
                    currentAiBubble = null;
                }
                playSurprised();
                if (!isPaused) setStatus("listening", "말씀하세요!");
            } else if (msg.type === "error") {
                alert(msg.message || "연결에 실패했어요.");
            }
        };
        ws.onclose = () => stopSession();
        ws.onerror = () => stopSession();
    }

    function stopSession() {
        isConnected = false;
        isPaused = false;
        setStatus("idle", "연결 종료됨");
        actionBtn.innerText = "대화 시작하기";
        actionBtn.classList.remove("recording");
        stage.classList.remove("paused");
        pauseBtn.textContent = "⏸️ 일시정지";
        pauseBtn.classList.remove("pause-active");
        setControlsEnabled(false);
        distSlider.disabled = false;
        powerSlider.disabled = false;
        stopAllAudio();
        if (processor) { processor.disconnect(); processor = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        if (audioContext) { audioContext.close(); audioContext = null; }
        if (ws) { ws.close(); ws = null; }
        finalizeBubbles();
        exportBtn.disabled = transcriptLog.length === 0;
    }

    function exportTranscript() {
        if (transcriptLog.length === 0) return;
        const start = sessionStartedAt ? sessionStartedAt.toLocaleString("ko-KR") : "";
        const lines = [];
        lines.push("=====================================");
        lines.push(" 마사마사와 한국어 수다 — 대화 기록");
        lines.push(" 시작 시각: " + start);
        lines.push(" 친밀도(D): " + distSlider.value + " / 지위(P): " + powerSlider.value);
        lines.push("=====================================");
        lines.push("");
        transcriptLog.forEach(item => {
            const who = item.role === "user" ? "나" : "마사마사";
            const mark = item.interrupted ? " (말 끊김)" : "";
            lines.push("[" + item.time + "] " + who + mark + ":");
            lines.push("  " + item.text.trim());
            lines.push("");
        });
        const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const dd = sessionStartedAt || new Date();
        const pad = n => String(n).padStart(2, "0");
        a.href = url;
        a.download = "대화기록_" + dd.getFullYear() + pad(dd.getMonth()+1) + pad(dd.getDate()) + "_" + pad(dd.getHours()) + pad(dd.getMinutes()) + ".txt";
        a.click();
        URL.revokeObjectURL(url);
    }

    function flushBubble(bubble, role, interrupted) {
        if (bubble && bubble.text.trim()) {
            transcriptLog.push({
                role: role,
                text: bubble.text,
                time: new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
                interrupted: !!interrupted
            });
        }
    }

    function stopAllAudio() {
        activeSources.forEach(src => { try { src.stop(); } catch(e) {} });
        activeSources = [];
        nextPlayTime = 0;
    }

    function setStatus(state, text) {
        statusText.textContent = text;
        headerStatus.textContent = text;
        statusDot.className = "dot " + (state === "connecting" ? "idle" : state);
        if (!stage.classList.contains("surprised") && !stage.classList.contains("paused")) {
            stage.classList.remove("listening", "speaking");
            if (state === "speaking") stage.classList.add("speaking");
            else if (state === "listening") stage.classList.add("listening");
        }
    }

    function playSurprised() {
        if (stage.classList.contains("paused")) return;
        stage.classList.remove("listening", "speaking");
        stage.classList.add("surprised");
        spawnEmote("❗");
        clearTimeout(surpriseTimer);
        surpriseTimer = setTimeout(() => {
            stage.classList.remove("surprised");
            stage.classList.add("listening");
        }, 900);
    }

    function detectEmotion(text) {
        const now = Date.now();
        if (now - lastEmoteAt < 2500) return;
        let emoji = null;
        if (/ㅋㅋ|하하|웃기|재밌|재미있/.test(text)) emoji = "😂";
        else if (/헐|대박|미쳤|우와/.test(text)) emoji = "✨";
        else if (/슬프|속상|힘들|아쉽|눈물/.test(text)) emoji = "💧";
        else if (/좋아|최고|짱|행복|신나/.test(text)) emoji = "💕";
        else if (/화나|짜증|서운|너무하/.test(text)) emoji = "💢";
        if (emoji) { spawnEmote(emoji); lastEmoteAt = now; }
    }

    function spawnEmote(emoji) {
        const el = document.createElement("div");
        el.className = "emote";
        el.textContent = emoji;
        el.style.left = (30 + Math.random() * 40) + "%";
        el.style.top = (12 + Math.random() * 10) + "%";
        stage.appendChild(el);
        setTimeout(() => el.remove(), 1500);
    }

    function appendTranscript(role, text) {
        if (emptyState) { emptyState.remove(); emptyState = null; }
        let current = role === "user" ? currentUserBubble : currentAiBubble;
        if (!current) {
            const row = document.createElement("div");
            row.className = "msg-row " + role;
            const group = document.createElement("div");
            group.className = "msg-group";
            if (role === "ai") {
                const profile = document.createElement("div");
                profile.className = "profile";
                const img = document.createElement("img");
                img.src = "/static/hamster.png";
                profile.appendChild(img);
                row.appendChild(profile);
                const name = document.createElement("div");
                name.className = "sender-name";
                name.textContent = "마사마사";
                group.appendChild(name);
            }
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;
            group.appendChild(bubble);
            row.appendChild(group);
            chatLog.appendChild(row);
            current = { el: bubble, text: text };
            if (role === "user") currentUserBubble = current;
            else currentAiBubble = current;
        } else {
            current.text += text;
            current.el.textContent = current.text;
        }
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function finalizeBubbles() {
        flushBubble(currentUserBubble, "user", false);
        flushBubble(currentAiBubble, "ai", false);
        currentUserBubble = null;
        currentAiBubble = null;
    }

    async function initAudioCapture() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true }
        });
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        source.connect(processor);
        processor.connect(audioContext.destination);
        processor.onaudioprocess = (e) => {
            if (!isConnected || isPaused || !ws || ws.readyState !== WebSocket.OPEN) return;
            const data = e.inputBuffer.getChannelData(0);
            const pcm = new Int16Array(data.length);
            for (let i = 0; i < data.length; i++) {
                const s = Math.max(-1, Math.min(1, data[i]));
                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            const b64 = btoa(new Uint8Array(pcm.buffer).reduce((d, b) => d + String.fromCharCode(b), ""));
            ws.send(JSON.stringify({ type: "audio", data: b64 }));
        };
    }

    function playReceivedPCM(base64Data) {
        if (!audioContext) return;
        const bytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
        const int16 = new Int16Array(bytes.buffer);
        const buf = audioContext.createBuffer(1, int16.length, 24000);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < int16.length; i++) ch[i] = int16[i] / 32768.0;
        const src = audioContext.createBufferSource();
        src.buffer = buf;
        src.playbackRate.value = playbackRate;
        src.connect(audioContext.destination);
        const now = audioContext.currentTime;
        const startAt = Math.max(now + 0.01, nextPlayTime);
        src.start(startAt);
        nextPlayTime = startAt + (buf.duration / playbackRate);
        activeSources.push(src);
        src.onended = () => {
            const idx = activeSources.indexOf(src);
            if (idx >= 0) activeSources.splice(idx, 1);
        };
    }

    // ── 서비스 워커 등록 (PWA 설치 요건) ──
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .catch((e) => console.warn('SW 등록 실패:', e));
        });
    }
</script>
