<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>마사마사와 한국어 수다</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#FF8C5A">
    <!-- iOS 홈 화면 설치용 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="마사마사">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <style>
        :root {
            --bg: #FFF8F0; --panel: #FFFFFF; --ink: #3D2C26; --muted: #B8A99E;
            --accent: #FF8C5A; --accent-soft: #FFE0CC; --navy: #3D5A80;
            --navy-soft: #E3EAF2; --danger: #E76F51;
            --kakao-bg: #BACEE0; --kakao-yellow: #FEE500;
            --shadow: 0 8px 30px -10px rgba(61, 44, 38, 0.18);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .app { width: 100%; max-width: 1060px; display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: stretch; }
        @media (max-width: 820px) { .app { grid-template-columns: 1fr; } }

        /* ── 왼쪽 패널 ── */
        .character-panel { position: relative; background: var(--panel); border-radius: 24px; box-shadow: var(--shadow); padding: 20px 18px; display: flex; flex-direction: column; align-items: center; gap: 10px; overflow-y: auto; max-height: 92vh; }
        .lang-btn { position: absolute; top: 12px; right: 12px; z-index: 5; border: 1.5px solid var(--navy-soft); background: #fff; border-radius: 10px; width: 34px; height: 30px; font-size: 15px; cursor: pointer; transition: transform 0.12s; }
        .lang-btn:hover { transform: translateY(-1px); }
        .title { text-align: center; }
        .title h1 { font-size: 16px; font-weight: 800; margin: 0 0 2px; }
        .title p { font-size: 11px; color: var(--muted); margin: 0; line-height: 1.4; }

        .stage { width: 100%; aspect-ratio: 1/1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 20px; }
        .stage-glow { position: absolute; inset: 0; border-radius: 20px; background: radial-gradient(circle at 50% 60%, var(--accent-soft), transparent 75%); opacity: 0.4; transition: opacity 0.4s, background 0.4s; }
        .stage.speaking .stage-glow { opacity: 0.9; }
        .stage.surprised .stage-glow { background: radial-gradient(circle at 50% 60%, #FFD6D6, transparent 75%); opacity: 1; }
        .stage.paused .stage-glow { background: radial-gradient(circle at 50% 60%, #E0E0E0, transparent 75%); }

        .hamster-wrap { position: relative; width: 70%; z-index: 1; transform-origin: 50% 92%; animation: breathe 3.2s ease-in-out infinite; }
        #hamster { width: 100%; display: block; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015) translateY(-1px); } }
        .stage.listening .hamster-wrap { animation: tilt 2.2s ease-in-out infinite; }
        @keyframes tilt { 0%, 100% { transform: rotate(0deg); } 30% { transform: rotate(-2.2deg); } 70% { transform: rotate(1.6deg); } }
        .stage.speaking .hamster-wrap { animation: talk-bounce 0.45s ease-in-out infinite; }
        @keyframes talk-bounce { 0%, 100% { transform: translateY(0) scale(var(--talk-scale, 1)); } 50% { transform: translateY(-5px) scale(var(--talk-scale, 1)); } }
        .stage.surprised .hamster-wrap { animation: shake 0.4s ease-in-out 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-1.5deg); } 75% { transform: translateX(5px) rotate(1.5deg); } }
        .stage.paused .hamster-wrap { animation: none; filter: grayscale(0.5); opacity: 0.75; }

        .emote { position: absolute; font-size: 32px; z-index: 2; pointer-events: none; animation: float-up 1.4s ease-out forwards; }
        @keyframes float-up { 0% { opacity: 0; transform: translateY(10px) scale(0.5); } 20% { opacity: 1; transform: translateY(-6px) scale(1.15); } 100% { opacity: 0; transform: translateY(-60px) scale(1); } }

        .speech-indicator { position: absolute; top: 5%; right: 7%; z-index: 2; background: #fff; border-radius: 14px; padding: 6px 12px; font-size: 12px; font-weight: 700; box-shadow: 0 3px 10px rgba(0,0,0,0.12); opacity: 0; transition: opacity 0.25s; }
        .stage.speaking .speech-indicator { opacity: 1; }
        .speech-indicator::after { content: ""; position: absolute; bottom: -6px; left: 16px; border: 7px solid transparent; border-top-color: #fff; border-bottom: 0; }

        .pause-overlay { position: absolute; inset: 0; z-index: 3; display: none; align-items: center; justify-content: center; font-size: 54px; background: rgba(255,255,255,0.35); border-radius: 20px; }
        .stage.paused .pause-overlay { display: flex; }

        .status { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--navy); }
        .status .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); transition: background 0.25s, box-shadow 0.25s; }
        .status .dot.listening { background: var(--navy); box-shadow: 0 0 0 4px var(--navy-soft); }
        .status .dot.speaking { background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); animation: pulse 0.9s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

        /* ── 페이더 섹션 ── */
        .fader-section { width: 100%; background: #F8F5F1; border-radius: 16px; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; overflow: hidden; max-height: 400px; opacity: 1; transition: max-height 0.45s ease, opacity 0.35s ease, padding 0.45s ease, margin 0.45s ease; }
        /* 모드 선택 전에는 접혀 있다가, 모드를 고르면 스르르 내려온다 */
        .fader-section.fader-collapsed { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; margin: 0; }
        .fader-section .section-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .fader-group { display: flex; flex-direction: column; gap: 4px; }
        .fader-header { display: flex; justify-content: space-between; align-items: center; }
        .fader-label { font-size: 12px; font-weight: 700; color: var(--ink); }
        .fader-value { font-size: 11px; font-weight: 800; color: var(--navy); background: var(--navy-soft); border-radius: 8px; padding: 2px 8px; min-width: 90px; text-align: center; }
        .fader-row { display: flex; align-items: center; gap: 8px; }
        .fader-row .end-label { font-size: 10px; color: var(--muted); white-space: nowrap; min-width: 36px; }
        .fader-row .end-label:last-child { text-align: right; }
        input[type="range"] { -webkit-appearance: none; appearance: none; flex: 1; height: 6px; border-radius: 3px; background: #E0D8D0; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2.5px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.18); }
        #distSlider::-webkit-slider-thumb { background: var(--accent); }
        #powerSlider::-webkit-slider-thumb { background: var(--navy); }

        /* ── 컨트롤 바 ── */
        .control-bar { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; }
        .ctrl-btn { border: none; background: var(--navy-soft); color: var(--navy); border-radius: 10px; width: 40px; height: 36px; font-size: 15px; cursor: pointer; transition: transform 0.12s, background 0.2s; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { transform: translateY(-1px); background: #D2DEEC; }
        .ctrl-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
        .ctrl-btn.pause-active { background: var(--accent-soft); }
        .speed-label { font-size: 11px; font-weight: 800; color: var(--navy); min-width: 40px; text-align: center; background: var(--navy-soft); border-radius: 8px; padding: 5px 0; }

        /* 눌러서 말하기(push-to-talk) 버튼 */
        .ptt-btn { margin: 10px 10px 0; border: none; border-radius: 16px; padding: 18px 16px; font-size: 16px; font-weight: 800; color: #fff; background: var(--navy); cursor: pointer; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: none; transition: background 0.15s, transform 0.1s, box-shadow 0.15s; }
        .ptt-btn:hover:not(:disabled) { background: #34507a; }
        .ptt-btn:disabled { opacity: 0.4; cursor: default; }
        .ptt-btn.talking { background: var(--danger); transform: scale(0.99); box-shadow: 0 0 0 5px rgba(231,111,81,0.22); }

        /* 빠른 요청 버튼 — 대화창(채팅 패널) 하단 배치 */
        .quick-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px 10px; background: rgba(255,255,255,0.35); }
        @media (max-width: 480px) { .quick-bar { grid-template-columns: 1fr 1fr; } }
        .quick-btn { border: 1.5px solid var(--accent-soft); background: #FFF6F0; color: var(--accent); border-radius: 12px; padding: 7px 4px; font-size: 11px; font-weight: 700; cursor: pointer; transition: transform 0.12s, background 0.2s; line-height: 1.3; }
        .quick-btn:hover:not(:disabled) { transform: translateY(-1px); background: var(--accent-soft); }
        .quick-btn:active:not(:disabled) { transform: scale(0.96); }
        .quick-btn:disabled { opacity: 0.35; cursor: default; }

        .action-btn { width: 100%; border: none; border-radius: 999px; padding: 12px 18px; font-size: 13px; font-weight: 800; color: #fff; background: var(--navy); cursor: pointer; transition: transform 0.15s, background 0.2s; box-shadow: 0 6px 16px -6px rgba(61,90,128,0.55); }
        .action-btn:hover { transform: translateY(-1px); }
        .action-btn.recording { background: var(--danger); }
        .main-controls { display: flex; gap: 8px; width: 100%; }
        .main-controls .action-btn { flex: 1; width: auto; }
        .pause-btn { background: var(--navy-soft); color: var(--navy); box-shadow: none; }
        .pause-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
        .pause-btn.pause-active { background: var(--accent); color: #fff; }
        .export-btn { width: 100%; border: 1.5px solid var(--navy); border-radius: 999px; padding: 9px 18px; font-size: 12px; font-weight: 800; color: var(--navy); background: transparent; cursor: pointer; transition: background 0.2s; }
        .export-btn:hover { background: var(--navy-soft); }
        .export-btn:disabled { opacity: 0.35; cursor: default; }

        /* ── 채팅 패널 ── */
        .chat-panel { background: var(--kakao-bg); border-radius: 24px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 540px; max-height: 92vh; overflow: hidden; }
        .chat-header { padding: 12px 16px; background: rgba(255,255,255,0.55); backdrop-filter: blur(6px); display: flex; align-items: center; gap: 10px; }
        .chat-header .avatar { width: 36px; height: 36px; border-radius: 13px; overflow: hidden; flex-shrink: 0; background: #fff; }
        .chat-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header .info h2 { font-size: 14px; font-weight: 800; margin: 0; }
        .chat-header .info span { font-size: 11px; color: #6B7A8A; }
        .chat-log { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-log::-webkit-scrollbar { width: 5px; }
        .chat-log::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
        .empty-state { margin: auto; text-align: center; color: #5A6B7B; font-size: 13px; line-height: 1.7; }
        .empty-state .emoji { font-size: 32px; display: block; margin-bottom: 10px; }
        .msg-row { display: flex; align-items: flex-end; gap: 6px; }
        .msg-row.user { flex-direction: row-reverse; }
        .msg-row .profile { width: 32px; height: 32px; border-radius: 12px; overflow: hidden; flex-shrink: 0; align-self: flex-start; background: #fff; }
        .msg-row .profile img { width: 100%; height: 100%; object-fit: cover; }
        .msg-group { display: flex; flex-direction: column; gap: 3px; max-width: 72%; }
        .msg-row.user .msg-group { align-items: flex-end; }
        .sender-name { font-size: 11px; color: #4A5A6A; margin-bottom: 2px; padding-left: 2px; }
        .bubble { padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; box-shadow: 0 1px 1px rgba(0,0,0,0.06); }
        .msg-row.ai .bubble { background: #FFFFFF; border-top-left-radius: 4px; }
        .msg-row.user .bubble { background: var(--kakao-yellow); color: #1A1A1A; border-top-right-radius: 4px; }
        .bubble.interrupted-mark { opacity: 0.6; text-decoration: line-through; }
        .chat-footer { padding: 8px 14px; background: rgba(255,255,255,0.55); font-size: 11px; color: #5A6B7B; text-align: center; }

        /* ── 언어 선택 오버레이 ── */
        .lang-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(61,44,38,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .lang-overlay.hidden { display: none; }
        .lang-box { background: #fff; border-radius: 24px; padding: 26px 22px; max-width: 540px; width: 100%; box-shadow: var(--shadow); text-align: center; max-height: 90vh; overflow-y: auto; }
        .lang-box h2 { margin: 0 0 4px; font-size: 17px; }
        .lang-box p { margin: 0 0 16px; font-size: 12px; color: var(--muted); }
        .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
        .lang-item { display: flex; align-items: center; gap: 9px; border: 1.5px solid #EEE3D8; background: #FFFBF6; border-radius: 12px; padding: 10px 12px; font-size: 13px; font-weight: 700; color: var(--ink); cursor: pointer; transition: transform 0.12s, border-color 0.2s, background 0.2s; text-align: left; }
        .lang-item:hover { transform: translateY(-1px); border-color: var(--accent); background: #FFF6F0; }
        .lang-item .flag { font-size: 20px; }

        /* ── 녹음 동의 모달 ── */
        .consent-box { max-width: 420px; }
        .name-input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 12px; border: 1.5px solid var(--accent-soft); font-size: 14px; margin-bottom: 14px; text-align: center; background: #FFFBF6; color: var(--ink); }
        .consent-box p.consent-text { font-size: 13px; color: var(--ink); line-height: 1.75; text-align: left; margin: 0 0 18px; }
        .consent-actions { display: flex; flex-direction: column; gap: 8px; }

        /* ── 카카오톡 인앱 브라우저 안내 배너 ── */
        .kakao-banner { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: #3D2C26; color: #fff; font-size: 12px; line-height: 1.5; padding: 10px 14px; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; text-align: center; }
        .kakao-banner.show { display: flex; }
        .kakao-banner button { border: none; border-radius: 8px; background: var(--kakao-yellow); color: #1A1A1A; font-weight: 800; font-size: 12px; padding: 6px 12px; cursor: pointer; white-space: nowrap; }

        /* ── 주제 대화(상황극) 모드 ── */
        .mode-toggle { display: flex; width: 100%; gap: 6px; }
        .mode-btn { flex: 1; border: 1.5px solid var(--navy-soft); background: #fff; color: var(--navy); border-radius: 12px; padding: 8px 4px; font-size: 12px; font-weight: 800; cursor: pointer; transition: background 0.2s, transform 0.12s; }
        .mode-btn:hover:not(:disabled) { transform: translateY(-1px); }
        .mode-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
        .mode-btn:disabled { opacity: 0.45; cursor: default; transform: none; }
        .rp-field { text-align: left; margin-bottom: 10px; }
        .rp-field label { display: block; font-size: 11px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
        .rp-input { width: 100%; box-sizing: border-box; padding: 9px 11px; border-radius: 10px; border: 1.5px solid var(--accent-soft); font-size: 13px; background: #FFFBF6; color: var(--ink); }
        .rp-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .style-seg { display: flex; gap: 6px; }
        .seg-btn { flex: 1; border: 1.5px solid var(--navy-soft); background: #fff; border-radius: 10px; padding: 8px 4px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--ink); }
        .seg-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }
        .rp-note { font-size: 11px; color: var(--muted); margin: 2px 0 12px; }
        .stage-list { text-align: left; display: flex; flex-direction: column; gap: 8px; margin: 12px 0 16px; max-height: 44vh; overflow-y: auto; }
        .stage-item { border: 1.5px solid var(--navy-soft); border-radius: 12px; padding: 9px 12px; background: #FBFDFF; }
        .stage-item .st-name { font-size: 13px; font-weight: 800; color: var(--navy); }
        .stage-item .st-native { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 600; }
        .stage-item .st-desc { font-size: 11px; color: #5A6B7B; margin-top: 2px; }
        .stage-item .st-expr { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .stage-item .st-expr span { font-size: 11px; background: var(--accent-soft); color: #8A4B2A; border-radius: 8px; padding: 2px 8px; }
        .progress-wrap { padding: 8px 14px 6px; background: rgba(255,255,255,0.55); border-bottom: 1px solid rgba(0,0,0,0.04); }
        .progress-wrap.hidden { display: none; }
        .progress-top { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
        #progressPct { font-size: 13px; }
        .progress-track { height: 10px; border-radius: 6px; background: #E8EDF3; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; border-radius: 6px; background: linear-gradient(90deg, var(--navy), #5B7EA6); transition: width 0.6s ease; }
        .progress-bar.over { background: linear-gradient(90deg, #F4A261, #E9C46A); }
        .stage-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .stage-chip { font-size: 10px; font-weight: 700; border-radius: 8px; padding: 2px 7px; background: #EDF1F6; color: #7A8AA0; border: 1px solid #E0E7EF; }
        .stage-chip.done { background: #DDF3E4; color: #2E7D4F; border-color: #BCE5CB; }
        .score-big { font-size: 44px; font-weight: 900; color: var(--accent); margin: 6px 0 0; }
        .score-sub { font-size: 12px; color: var(--muted); margin: 0 0 12px; }
        .result-stages { text-align: left; margin: 0 0 14px; display: flex; flex-direction: column; gap: 5px; }
        .result-stages div { font-size: 12px; font-weight: 700; }
        .result-stages .ok { color: #2E7D4F; }
        .result-stages .no { color: #B8A99E; }

        /* ── 주제 자동 추천 (예) 표시 + 🎲 목적 재추첨 ── */
        .rp-input-row { display: flex; gap: 6px; }
        .rp-input-row .rp-input { flex: 1; min-width: 0; }
        .dice-btn { border: 1.5px solid var(--accent-soft); background: #FFF6F0; border-radius: 10px; width: 42px; font-size: 17px; cursor: pointer; flex-shrink: 0; transition: transform 0.15s; }
        .dice-btn:hover:not(:disabled) { transform: rotate(-18deg) scale(1.08); }
        .dice-btn:disabled { opacity: 0.35; cursor: default; }
        .rp-style-hint { color: #8A4B2A; background: var(--accent-soft); border-radius: 8px; padding: 4px 10px; display: inline-block; }

        /* ── 발화 연습 (듣고 따라 말하기 → 말차례 교환) ── */
        .stage-item.clickable { cursor: pointer; transition: transform 0.12s, border-color 0.2s, box-shadow 0.2s; }
        .stage-item.clickable:hover { transform: translateY(-1px); border-color: var(--accent); box-shadow: 0 4px 12px -6px rgba(255,140,90,0.4); }
        .st-side { float: right; display: flex; gap: 4px; align-items: center; }
        .st-mic-hint { font-size: 13px; opacity: 0.55; }
        .st-badge { font-size: 10px; font-weight: 800; color: #2E7D4F; background: #DDF3E4; border: 1px solid #BCE5CB; border-radius: 8px; padding: 2px 7px; }
        .pr-stage-name { font-size: 12px; color: #5A6B7B; font-weight: 700; margin: 0 0 10px; }
        .pr-step { font-size: 13px; font-weight: 800; color: var(--navy); margin: 0 0 2px; }
        .pr-cue-row { display: flex; align-items: flex-end; gap: 6px; margin: 10px 0 4px; }
        .pr-cue-row.hidden { display: none; }
        .pr-cue-row .profile { width: 30px; height: 30px; border-radius: 11px; overflow: hidden; flex-shrink: 0; background: #fff; border: 1px solid #EEE; }
        .pr-cue-row .profile img { width: 100%; height: 100%; object-fit: cover; }
        .pr-cue-bubble { background: #EDF1F6; border-radius: 14px; border-bottom-left-radius: 4px; padding: 10px 14px; font-size: 14px; font-weight: 600; text-align: left; max-width: 85%; line-height: 1.5; }
        .pr-target { position: relative; font-size: 17px; font-weight: 800; line-height: 1.55; background: #FFFBF0; border: 1.5px solid var(--kakao-yellow); border-radius: 14px; border-bottom-right-radius: 4px; padding: 13px 15px; margin: 8px 0 4px; }
        .pr-listen-btn { border: 1.5px solid var(--navy-soft); background: #fff; color: var(--navy); border-radius: 10px; padding: 6px 14px; font-size: 12px; font-weight: 800; cursor: pointer; margin-top: 4px; }
        .pr-listen-btn:hover { background: var(--navy-soft); }
        .pr-mic { border: none; width: 78px; height: 78px; border-radius: 24px; font-size: 32px; background: #3E9BFF; color: #fff; cursor: pointer; box-shadow: 0 8px 18px -6px rgba(62,155,255,0.65); transition: transform 0.12s, background 0.2s; margin: 12px auto 0; display: flex; align-items: center; justify-content: center; }
        .pr-mic:hover:not(:disabled) { transform: translateY(-2px); }
        .pr-mic.rec { background: var(--danger); animation: pulse 0.9s ease-in-out infinite; }
        .pr-mic:disabled { opacity: 0.35; cursor: default; }
        .pr-mic-label { font-size: 11px; font-weight: 700; color: var(--muted); margin: 6px 0 0; min-height: 15px; }
        .pr-feedback { min-height: 44px; margin-top: 8px; font-size: 14px; font-weight: 800; }
        .pr-feedback .fb-main.great, .pr-feedback .fb-main.ok { color: #2E7D4F; }
        .pr-feedback .fb-main.retry { color: var(--danger); }
        .pr-feedback .fb-heard { font-size: 12px; color: #5A6B7B; font-weight: 600; margin-top: 3px; }
        .pr-dots { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
        .pr-dot { width: 9px; height: 9px; border-radius: 50%; background: #E0D8D0; transition: background 0.25s; }
        .pr-dot.cur { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .pr-dot.done { background: #2E7D4F; }

        /* ── 확장 중(100% 초과) 전기 충격 셰이크 ── */
        @keyframes zapShake {
            0%, 100% { transform: translate(0, 0); }
            12% { transform: translate(-8px, 4px) rotate(-0.6deg); }
            25% { transform: translate(7px, -5px) rotate(0.5deg); }
            37% { transform: translate(-6px, -3px) rotate(-0.3deg); }
            50% { transform: translate(5px, 4px) rotate(0.4deg); }
            62% { transform: translate(-4px, 2px); }
            75% { transform: translate(3px, -2px); }
            87% { transform: translate(-2px, 1px); }
        }
        body.zap-shake { animation: zapShake 0.45s linear; }

        /* ── 앱 다운로드(PWA 설치) 버튼 ── */
        .app-dl-btn { border: none; border-radius: 999px; padding: 8px 22px; font-size: 12px; font-weight: 800; color: #fff; background: var(--navy); cursor: pointer; box-shadow: 0 4px 12px -4px rgba(61,90,128,0.55); transition: transform 0.12s; }
        .app-dl-btn:hover { transform: translateY(-1px); }
    </style>
</head>

        <!-- 눌러서 말하기(push-to-talk): 누르는 동안만 녹음·전송, 떼면 '발화 끝'을 서버로 명시 →

<script>
    // 오디오 컨텍스트 분리: 마이크 캡처(16kHz)와 Gemini 응답 재생(24kHz)을
    // 같은 컨텍스트에 두면 청크마다 리샘플링이 리셋되며 클릭/파열음 발생 → 목소리 갈라짐
    let ws = null, captureCtx = null, playbackCtx = null, processor = null, workletNode = null, mediaStream = null, isConnected = false;
    let mixDest = null, recorder = null, recordedChunks = [], recorderMime = "";
    let footerNoteTimer = null;
    let sessionUploaded = false; // 세션당 1회 업로드 보장 (종료 버튼/탭 닫기 이중 전송 방지)

    /* ── 지연 진단 (📶 서버왕복 · ⬆ 업로드적체 · ⏱ 응답소요) ── */
    const APP_VERSION = "v13";
    console.log("마사마사 클라이언트 " + APP_VERSION);
    let pingTimer = null, lastRtt = null, lastTurnSec = null, userTextAt = null;
    const netStatEl = document.getElementById("netStat");
    function updateNetStat() {
        if (!isConnected) { netStatEl.textContent = APP_VERSION; return; }
        const parts = [APP_VERSION];
        if (lastRtt != null) parts.push("📶 " + lastRtt + "ms");
        if (ws) parts.push("⬆ " + Math.round(ws.bufferedAmount / 1024) + "KB");
        if (lastTurnSec != null) parts.push("⏱ " + lastTurnSec.toFixed(1) + "s");
        netStatEl.textContent = parts.join(" · ");
    }
    function startPinger() {
        clearInterval(pingTimer);
        pingTimer = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                try { ws.send(JSON.stringify({ type: "ping", t: performance.now() })); } catch (e) {}
                updateNetStat(); // bufferedAmount(업로드 적체)도 함께 갱신
            }
        }, 4000);
    }
    updateNetStat();
    const isKakao = /KAKAOTALK/i.test(navigator.userAgent);
    let isPaused = false;
    let isTalking = false;     // push-to-talk: 버튼을 누르고 있는 동안만 true
    let playbackRate = 1.0;
    let nextPlayTime = 0;
    let activeSources = [];
    let currentUserBubble = null, currentAiBubble = null;
    let surpriseTimer = null;
    let lastEmoteAt = 0;
    let transcriptLog = [];
    let sessionStartedAt = null;

    /* ── 주제 대화(상황극) 상태 ── */
    let mode = "free";                 // "free" 자유 수다 | "rp" 주제 대화
    let rpId = null, rpPlan = null, rpStyle = "auto";
    let rpPercent = 0, rpStagesState = [];
    let rpSessionActive = false;       // 현재(직전) 세션이 상황극인지
    let rpEnding = false, rpFinal = null, finalScoreTimer = null;

    const actionBtn = document.getElementById("actionBtn");
    const exportBtn = document.getElementById("exportBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const pttBtn = document.getElementById("pttBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const headerStatus = document.getElementById("headerStatus");
    const stage = document.getElementById("stage");
    const hamsterWrap = document.getElementById("hamsterWrap");
    const chatLog = document.getElementById("chatLog");
    let emptyState = document.getElementById("emptyState");

    const distSlider = document.getElementById("distSlider");
    const powerSlider = document.getElementById("powerSlider");
    const distValue = document.getElementById("distValue");
    const powerValue = document.getElementById("powerValue");

    const modeFreeBtn = document.getElementById("modeFreeBtn");
    const modeRpBtn = document.getElementById("modeRpBtn");
    const rpSetupOverlay = document.getElementById("rpSetupOverlay");
    const rpBriefOverlay = document.getElementById("rpBriefOverlay");
    const rpResultOverlay = document.getElementById("rpResultOverlay");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");
    const progressPct = document.getElementById("progressPct");

    /* ── 앱 다운로드(PWA 설치) 버튼 — 채팅 패널 하단 푸터 ──
       크롬/삼성인터넷: beforeinstallprompt를 붙잡아 버튼 클릭 시 설치 프롬프트.
       iOS 사파리 등 미지원: 수동 설치 방법 안내. 이미 앱(standalone)이면 버튼 숨김. */
    let deferredInstall = null;
    const isStandaloneApp = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
        || window.navigator.standalone === true;
    window.addEventListener("beforeinstallprompt", (e) => {

    /* ══════════ 주제 대화(상황극) 모드 ══════════
       ① 학습자가 주제·목적·장소·역할을 설정(모국어 가능) + 화계 선택

       ④ 종료 버튼 → 진행률이 점수로 치환 + 대화 자동 저장 */
    /* ── 페이더 위치 제어 ──

    document.getElementById("rpMakeBtn").addEventListener("click", async () => {

    /* 표현 항목은 신형 {text, cue} 객체 — 혹시 남아 있을 구형 문자열도 수용 */
    function exprText(e) { return typeof e === "string" ? e : (e && e.text) || ""; }

    function renderStageList() {

    function showBriefing() {

        document.getElementById("rpBriefScenario").textContent =
            "🎭 " + rpPlan.topic_ko + " · 🎯 " + rpPlan.goal_ko + " · 📍 " + rpPlan.place_ko +
            " · 🙋 " + rpPlan.user_role + " ↔ 🐹 " + rpPlan.ai_role;
        renderStageList();
        rpBriefOverlay.classList.remove("hidden");
    }
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    document.getElementById("rpBeginBtn").addEventListener("click", () => {

    /* ══════════ 자동 추천 ══════════
       대화 장소나 달성 목적 중 하나만 적으면 나머지(목적 3단계·장소·역할·화계)가 '예)'로 채워진다.
       목적은 ①교재형(이상적) ②일상형(흔한 변수) ③엉뚱형(뜻밖) 3단계.
       🎲는 항상 활성 — 누르면 다음 단계 목적으로 순환하고, 한 바퀴 돌면 전체를 새로 추천받는다.
       빈칸으로 제출하면 화면에 보이던 추천값이 그대로 쓰인다. */
    let sgData = null, sgGoalIdx = 0, sgTimer = null, sgLastKey = "", sgSeq = 0, sgLoading = false;
    let rpPracticed = {};                      // stageIdx -> true (연습 완료 배지)
    const rpGoalInput = document.getElementById("rpGoal");
    const rpPlaceInput = document.getElementById("rpPlace");
    const rpMyRoleInput = document.getElementById("rpMyRole");
    const rpAiRoleInput = document.getElementById("rpAiRole");
    const rpGoalDice = document.getElementById("rpGoalDice");
    const rpStyleHintEl = document.getElementById("rpStyleHintEl");

    function sgInputsKey() { return rpPlaceInput.value.trim() + "|" + rpGoalInput.value.trim(); }

    function sgApplyPlaceholders() {
        if (!sgData) return;
        rpGoalInput.placeholder = "예) " + sgData.goals[sgGoalIdx];
        if (sgData.place) rpPlaceInput.placeholder = "예) " + sgData.place;
        if (sgData.my_role) rpMyRoleInput.placeholder = "예) " + sgData.my_role;
        if (sgData.ai_role) rpAiRoleInput.placeholder = "예) " + sgData.ai_role;
        const styleWord = sgData.style === "banmal" ? t("sgBanmal") : t("sgPolite");
        rpStyleHintEl.textContent = "예) " + styleWord + (sgData.style_reason ? " — " + sgData.style_reason : "");
        rpStyleHintEl.style.display = "";
    }
    async function sgFetch() {
        const place = rpPlaceInput.value.trim();
        const goal = rpGoalInput.value.trim();
        if (!place && !goal) return;
        sgLastKey = sgInputsKey();
        const seq = ++sgSeq;                   // 오래된 응답이 최신 응답을 덮지 않게
        sgLoading = true;
        rpGoalInput.placeholder = t("sgLoading");
        try {
            const res = await fetch("/roleplay-suggest", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ place: place, goal: goal, lang: uiLang || "ko" }),
            });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            if (seq !== sgSeq) return;         // 그 사이 입력이 바뀜 — 이 응답은 폐기
            sgData = data;
            sgGoalIdx = Math.floor(Math.random() * sgData.goals.length); // 3단계 중 랜덤
            sgApplyPlaceholders();
        } catch (e) {
            console.warn("자동 추천 실패:", e);
            if (seq === sgSeq) rpGoalInput.placeholder = t("rpGoalPh");
        } finally {
            if (seq === sgSeq) sgLoading = false;
        }
    }
    function sgOnInput() {
        clearTimeout(sgTimer);
        const key = sgInputsKey();
        if (key === "|" || key === sgLastKey) return;
        sgTimer = setTimeout(sgFetch, 800);    // 입력이 멈추면 자동 추천
    }
    rpPlaceInput.addEventListener("input", sgOnInput);
    rpGoalInput.addEventListener("input", sgOnInput);
    rpGoalDice.addEventListener("click", () => {
        if (sgLoading) return;
        if (!rpPlaceInput.value.trim() && !rpGoalInput.value.trim()) { alert(t("rpNeedTopic")); return; }
        if (sgData && sgInputsKey() === sgLastKey) {
            sgGoalIdx += 1;
            if (sgGoalIdx >= sgData.goals.length) sgFetch();   // 한 바퀴 돌면 전체 새 추천
            else sgApplyPlaceholders();
        } else {
            sgFetch();                                          // 입력이 바뀌었거나 첫 추천
        }
    });

    /* ══════════ 발화 연습 (단계 탭 → 듀오링고식 말하기 연습) ══════════
       각 표현마다: ① 듣고 따라 말하기 → ② (cue가 있으면) 화면·소리로 제시된
       상대 발화에 그 표현으로 대답하기(말차례 교환).
       TTS·STT 모두 브라우저 내장(Web Speech API) — 비용 0, 즉각 반응.
       음성 인식 미지원 브라우저(카톡 인앱 등)는 '말해 봤어요' 버튼으로 진행. */
    const prOverlay = document.getElementById("prOverlay");
    const prStageName = document.getElementById("prStageName");
    const prStepLbl = document.getElementById("prStepLbl");
    const prHintEl = document.getElementById("prHintEl");
    const prCueRow = document.getElementById("prCueRow");
    const prCueText = document.getElementById("prCueText");
    const prTargetEl = document.getElementById("prTarget");
    const prListenBtn = document.getElementById("prListenBtn");
    const prFeedback = document.getElementById("prFeedback");
    const prMicBtn = document.getElementById("prMicBtn");
    const prMicLabel = document.getElementById("prMicLabel");
    const prDots = document.getElementById("prDots");
    const prSaidBtn = document.getElementById("prSaidBtn");
    const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition || null;
    let prStageIdx = 0, prExprIdx = 0, prPhase = "repeat";   // repeat | reply
    let prRec = null, prRecOn = false, prGotResult = false, prAdvTimer = null;

    /* ── TTS: 기기 내장 한국어 음성 ── */
    let koVoice = null;
    function pickKoVoice() {
        try {
            const vs = speechSynthesis.getVoices();
            koVoice = vs.find(v => /^ko/i.test(v.lang) && /google/i.test(v.name)) ||
                      vs.find(v => /^ko/i.test(v.lang)) || null;
        } catch (e) {}
    }
    if (window.speechSynthesis) {
        pickKoVoice();
        speechSynthesis.onvoiceschanged = pickKoVoice;
    }
    let speakGuard = null;
    function speakKo(text) {
        if (!window.speechSynthesis || !text) return;
        try {
            speechSynthesis.cancel();
            clearInterval(speakGuard);
            // 발화가 길면 TTS가 중간에 끊기는 브라우저 버그(특히 크롬 장문 15초 제한) 대응:
            // ① 문장 단위로 쪼개 짧은 utterance를 순서대로 큐잉
            const parts = String(text).match(/[^.!?…]+[.!?…]*\s*/g) || [String(text)];
            const chunks = [];
            parts.forEach(p => {
                p = p.trim();
                while (p.length > 110) { chunks.push(p.slice(0, 110)); p = p.slice(110); }
                if (p) chunks.push(p);
            });
            chunks.forEach(cText => {
                const u = new SpeechSynthesisUtterance(cText);
                u.lang = "ko-KR";
                if (koVoice) u.voice = koVoice;
                u.rate = 0.88;                 // 학습자 배려 — 살짝 천천히
                speechSynthesis.speak(u);
            });
            // ② 말하는 동안 주기적으로 resume() — 일시정지 상태로 얼어붙는 버그 해제
            speakGuard = setInterval(() => {
                if (!speechSynthesis.speaking) clearInterval(speakGuard);
                else speechSynthesis.resume();
            }, 5000);
        } catch (e) {}
    }

    /* ── 채점: 한글을 자모로 분해한 뒤 편집거리 유사도 (학습자에게 관대하게) ── */
    const _CHO = "ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ";
    const _JUNG = "ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ";
    const _JONG = ["", "ㄱ", "ㄲ", "ㄳ", "ㄴ", "ㄵ", "ㄶ", "ㄷ", "ㄹ", "ㄺ", "ㄻ", "ㄼ", "ㄽ", "ㄾ", "ㄿ", "ㅀ", "ㅁ", "ㅂ", "ㅄ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
    function toJamo(s) {
        let out = "";
        for (const ch of s) {
            const c = ch.charCodeAt(0);
            if (c >= 0xAC00 && c <= 0xD7A3) {
                const i = c - 0xAC00;
                out += _CHO[Math.floor(i / 588)] + _JUNG[Math.floor((i % 588) / 28)] + _JONG[i % 28];
            } else out += ch;
        }
        return out;
    }
    function normKo(s) { return toJamo(String(s).toLowerCase().replace(/[\s.,!?~…·'"“”‘’()\[\]\-]/g, "")); }
    function editDist(a, b) {
        const m = a.length, n = b.length;
        if (!m) return n;
        if (!n) return m;
        let prev = new Array(n + 1);
        for (let j = 0; j <= n; j++) prev[j] = j;
        for (let i = 1; i <= m; i++) {
            const cur = [i];
            for (let j = 1; j <= n; j++) {
                cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
            }
            prev = cur;
        }
        return prev[n];
    }
    function simScore(said, target) {
        const A = normKo(said), B = normKo(target);
        if (!A || !B) return 0;
        return 1 - editDist(A, B) / Math.max(A.length, B.length);
    }

    function curExpr() {
        const st = rpPlan && rpPlan.stages[prStageIdx];
        return (st && st.expressions && st.expressions[prExprIdx]) || null;
    }
    function openPractice(si) {
        if (!rpPlan) return;
        prStageIdx = si;
        prExprIdx = 0;
        prPhase = "repeat";
        prOverlay.classList.remove("hidden");
        renderPractice(true);
    }
    function renderPractice(autoplay) {
        clearTimeout(prAdvTimer);
        const st = rpPlan.stages[prStageIdx];
        const e = curExpr();
        if (!e) { finishStagePractice(); return; }
        prStageName.textContent = (prStageIdx + 1) + ". " + st.name + (st.native ? " · " + st.native : "");
        const isReply = prPhase === "reply";
        prStepLbl.textContent = isReply ? t("prStepReply") : t("prStepRepeat");
        prHintEl.textContent = isReply ? t("prReplyHint") : t("prRepeatHint");
        prCueRow.classList.toggle("hidden", !isReply);
        if (isReply) prCueText.textContent = exprCue(e);
        prTargetEl.textContent = exprText(e);
        prFeedback.innerHTML = "";
        prMicBtn.disabled = false;
        prMicBtn.classList.remove("rec");
        if (SRClass) {
            prMicBtn.style.display = "";
            prMicLabel.textContent = t("prMicIdle");
            prSaidBtn.style.display = "none";
        } else {
            prMicBtn.style.display = "none";
            prMicLabel.textContent = t("prNoSR");
            prSaidBtn.style.display = "";
        }
        renderPrDots();
        // 따라 말하기 = 목표 문장을, 말차례 교환 = 상대 발화를 들려준다
        if (autoplay) speakKo(isReply ? exprCue(e) : exprText(e));
    }
    function renderPrDots() {
        const st = rpPlan.stages[prStageIdx];
        prDots.innerHTML = "";
        (st.expressions || []).forEach((x, i) => {
            const d = document.createElement("span");
            d.className = "pr-dot" + (i < prExprIdx ? " done" : i === prExprIdx ? " cur" : "");
            prDots.appendChild(d);
        });
    }
    prListenBtn.addEventListener("click", () => {
        const e = curExpr();
        if (!e) return;
        speakKo(prPhase === "reply" ? exprCue(e) : exprText(e));
    });

    function prStopRecUI() {
        prRecOn = false;
        prMicBtn.classList.remove("rec");
        if (SRClass) prMicLabel.textContent = t("prMicIdle");
    }
    prMicBtn.addEventListener("click", () => {
        if (!SRClass || prMicBtn.disabled) return;
        if (prRecOn) { try { prRec.stop(); } catch (e) {} return; }  // 두 번째 탭 = 말 끝
        if (window.speechSynthesis) { try { speechSynthesis.cancel(); } catch (e) {} }
        prGotResult = false;
        try {
            prRec = new SRClass();
            prRec.lang = "ko-KR";
            prRec.interimResults = false;
            prRec.maxAlternatives = 5;
            prRec.onresult = (ev) => {
                prGotResult = true;
                const alts = Array.prototype.map.call(ev.results[0], r => r.transcript);
                prEvaluate(alts);
            };
            prRec.onerror = () => {};
            prRec.onend = () => {
                prStopRecUI();
                if (!prGotResult) prShowFeedback("retry", t("prNoSpeech"), "");
            };
            prRec.start();
            prRecOn = true;
            prMicBtn.classList.add("rec");
            prMicLabel.textContent = t("prMicRec");
            prFeedback.innerHTML = "";
        } catch (e) {
            console.warn("음성 인식 시작 실패:", e);
            prStopRecUI();
        }
    });

    function prShowFeedback(cls, main, heard) {
        prFeedback.innerHTML = "";
        const m = document.createElement("div");
        m.className = "fb-main " + cls;
        m.textContent = main;
        prFeedback.appendChild(m);
        if (heard) {
            const h = document.createElement("div");
            h.className = "fb-heard";
            h.textContent = t("prHeard") + ": “" + heard + "”";
            prFeedback.appendChild(h);
        }
    }
    function prEvaluate(alts) {
        const e = curExpr();
        if (!e) return;
        const target = exprText(e);
        let best = 0, bestText = alts[0] || "";
        alts.forEach(a => { const s = simScore(a, target); if (s > best) { best = s; bestText = a; } });
        if (best >= 0.8) {
            prShowFeedback("great", t("prGreat"), bestText);
            prAdvTimer = setTimeout(advancePhase, 1300);
        } else if (best >= 0.55) {
            prShowFeedback("ok", t("prGood"), bestText);
            prAdvTimer = setTimeout(advancePhase, 1300);
        } else {
            prShowFeedback("retry", t("prRetry"), bestText);  // 통과 못 함 — 다시 시도
        }
    }
    function advancePhase() {
        clearTimeout(prAdvTimer);
        const e = curExpr();
        if (prPhase === "repeat" && e && exprCue(e)) {
            prPhase = "reply";              // 따라 말하기 → 같은 표현으로 말차례 교환
            renderPractice(true);
        } else {
            prExprIdx++;
            const st = rpPlan.stages[prStageIdx];
            if (prExprIdx >= (st.expressions || []).length) { finishStagePractice(); return; }
            prPhase = "repeat";
            renderPractice(true);
        }
    }
    function finishStagePractice() {
        rpPracticed[prStageIdx] = true;
        prShowFeedback("great", t("prAllDone"), "");

    function closePractice() {
        clearTimeout(prAdvTimer);

        prOverlay.classList.add("hidden");

    }
    prSaidBtn.addEventListener("click", advancePhase);   // 음성 인식 미지원 폴백
    document.getElementById("prSkipBtn").addEventListener("click", advancePhase);
    document.getElementById("prCloseBtn").addEventListener("click", closePractice);

    /* ── 효과음 (WebAudio 합성 — 오디오 파일 불필요) ── */
    let fxCtx = null;
    function fxContext() {
        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!fxCtx) fxCtx = new AC();
            if (fxCtx.state === "suspended") fxCtx.resume().catch(() => {});
            return fxCtx;
        } catch (e) { return null; }
    }
    function fxTone(ctx, type, f0, f1, t0, dur, vol) {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(f0, t0);
        if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g);
        g.connect(ctx.destination);
        o.start(t0);
        o.stop(t0 + dur + 0.02);
    }
    function playDing() { // 기능 단계 달성 — 짧고 경쾌한 딩동↑
        const c = fxContext();
        if (!c) return;
        const t0 = c.currentTime + 0.01;
        fxTone(c, "sine", 880, 880, t0, 0.12, 0.14);
        fxTone(c, "sine", 1318.5, 1318.5, t0 + 0.09, 0.22, 0.14);
    }
    function playZap() { // 확장 중 — 전기 지지직⚡
        const c = fxContext();
        if (!c) return;
        const t0 = c.currentTime + 0.01;
        fxTone(c, "sawtooth", 240, 35, t0, 0.28, 0.10);
        fxTone(c, "square", 1800, 180, t0, 0.16, 0.05);
        fxTone(c, "square", 900, 60, t0 + 0.08, 0.14, 0.04);
    }
    let zapTimer = null;
    function screenZap() { // 화면 전체 전기 충격 셰이크 + 사운드
        playZap();
        document.body.classList.remove("zap-shake");
        void document.body.offsetWidth; // 리플로우 강제 — 애니메이션 재시작
        document.body.classList.add("zap-shake");
        clearTimeout(zapTimer);
        zapTimer = setTimeout(() => document.body.classList.remove("zap-shake"), 500);
    }

    function renderProgress() {
        progressPct.textContent = rpPercent + "%";
        progressBar.style.width = Math.min(100, rpPercent) + "%";
        progressBar.classList.toggle("over", rpPercent > 100);
        progressLabel.textContent = rpPercent > 100 ? t("rpOverLabel") : t("progressLabel");
        stageChips.innerHTML = "";
        rpStagesState.forEach(s => {
            const c = document.createElement("span");
            c.className = "stage-chip" + (s.done ? " done" : "");
            c.textContent = (s.done ? "✓ " : "") + s.name;
            stageChips.appendChild(c);
        });
    }

    /* 종료 버튼: 서버에 최종 분석을 요청하고 점수를 받은 뒤 세션을 닫는다 */
    function endRoleplaySession() {
        if (rpEnding) return;
        rpEnding = true;
        actionBtn.disabled = true;
        setFooterNote(t("rpScoring"), true);
        try {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "end_session" }));
        } catch (e) {}
        finalScoreTimer = setTimeout(concludeRoleplay, 9000); // 서버 무응답 폴백: 마지막 진행률로 점수 확정
    }
    function concludeRoleplay() {
        if (!rpEnding) return;
        rpEnding = false;
        clearTimeout(finalScoreTimer);
        actionBtn.disabled = false;
        if (!rpFinal) rpFinal = { percent: rpPercent, score: rpPercent, stages: rpStagesState };

    function showRpResult() {

    /* ── 카카오톡 인앱 브라우저: Blob 다운로드가 차단되므로 외부 브라우저 안내 ── */

    /* ── 페이더 라벨 업데이트 (다국어) ── */
    function getDistLabel(v) {

        if (v <= 65) return v + " · " + L[2];

    }
    function getPowerLabel(v) {

        if (v <= 35) return v + " · " + L[1];

    distSlider.addEventListener("input", () => { distValue.textContent = getDistLabel(+distSlider.value); });
    powerSlider.addEventListener("input", () => { powerValue.textContent = getPowerLabel(+powerSlider.value); });

    function togglePause() {
        if (!isConnected || !captureCtx) return;
        isPaused = !isPaused;
        if (isPaused) {
            captureCtx.suspend();
            if (playbackCtx) playbackCtx.suspend();
            if (recorder && recorder.state === "recording") { try { recorder.pause(); } catch (e) {} }
            stage.classList.add("paused");
            pauseBtn.textContent = t("btnResume");
            pauseBtn.classList.add("pause-active");
            setStatus("idle", "stPaused");
        } else {
            captureCtx.resume();
            if (playbackCtx) playbackCtx.resume();
            if (recorder && recorder.state === "paused") { try { recorder.resume(); } catch (e) {} }
            stage.classList.remove("paused");
            pauseBtn.textContent = t("btnPause");
            pauseBtn.classList.remove("pause-active");
