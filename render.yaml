services:
  - type: web
    name: masamasa-chatbot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ACCESS_CODE
        sync: false
      - key: MAX_CONCURRENT_SESSIONS
        value: "5"
