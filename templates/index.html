        }
    }

    /* ── 빠른 요청 화행: D/P 페이더 단계에 따라 표현이 달라짐 ──
       레벨 0(상급자·낯선 사이: 최고 격식) → 4(하급자·절친: 반말 명령)
       버튼 자체가 "관계에 따라 같은 요청을 어떻게 다르게 말하는지" 가르치는 장치 */
    const QUICK_PHRASES = {
        qSlow:  ["죄송하지만, 천천히 말씀해 주시겠습니까?", "혹시 좀 천천히 말씀해 주시겠어요?", "좀 천천히 말해 줄래요?", "천천히 말해 줘.", "천천히 좀 말해라."],
        qAgain: ["죄송하지만, 다시 말씀해 주시겠습니까?", "혹시 좀 다시 말씀해 주시겠어요?", "좀 다시 말해 줄래요?", "다시 말해 줘.", "다시 말해 봐."],
        qEasy:  ["죄송하지만, 쉽게 말씀해 주시겠습니까?", "혹시 좀 쉽게 말씀해 주시겠어요?", "좀 쉽게 말해 줄래요?", "쉽게 말해 줘.", "쉽게 좀 얘기해."],
        qFast:  ["죄송하지만, 신속히 말씀해 주시겠습니까?", "혹시 좀 더 빨리 말씀해 주시겠어요?", "좀 빨리 말해 줄래요?", "빨리 말해 줘.", "빨리빨리 좀 말해라."]
    };
    function getQuickPhrase(key) {
        // 친밀도(D)와 사용자 지위(P)를 평균 내서 5단계 화행 레벨로 변환
        const avg = (+distSlider.value + +powerSlider.value) / 2;
        let lv;
        if (avg <= 15) lv = 0;
        else if (avg <= 35) lv = 1;
        else if (avg <= 65) lv = 2;
        else if (avg <= 85) lv = 3;
        else lv = 4;
        return (QUICK_PHRASES[key] || [])[lv] || "";
    }
    const quickBtns = document.querySelectorAll(".quick-btn");
    quickBtns.forEach(btn => btn.addEventListener("click", () => sendQuickPhrase(getQuickPhrase(btn.dataset.qkey))));

    /* ── 눌러서 말하기 (push-to-talk) ──
       누른 순간: activity_start(발화 시작) → 누르는 동안 오디오 전송
       뗀 순간: activity_end(발화 끝) → Gemini가 즉시 턴 확정 → STT 바로 반영 */
    function startTalking() {
        if (!isConnected || isPaused || isTalking || !ws || ws.readyState !== WebSocket.OPEN) return;
        isTalking = true;
        if (captureCtx && captureCtx.state === "suspended") captureCtx.resume().catch(() => {});
        stopAllAudio();                 // 말하려고 누르면 마사마사 발화를 즉시 멈춤(끼어들기)
        try { ws.send(JSON.stringify({ type: "activity_start" })); } catch (e) {}
        pttBtn.classList.add("talking");
        pttBtn.textContent = t("pttTalking");
        setStatus("listening", "stListening");
    }
    function stopTalking() {
        if (!isTalking) return;
        isTalking = false;
        try { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "activity_end" })); } catch (e) {}
        pttBtn.classList.remove("talking");
        pttBtn.textContent = t("pttHold");
        if (isConnected && !isPaused) setStatus("idle", "stThinking");
    }
    // 포인터 이벤트로 마우스·터치·펜 통합 처리. setPointerCapture로 손가락이
    // 버튼 밖으로 나가도 뗄 때(pointerup)까지 추적된다.
    pttBtn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        try { pttBtn.setPointerCapture(e.pointerId); } catch (_) {}
        startTalking();
    });
    pttBtn.addEventListener("pointerup", (e) => { e.preventDefault(); stopTalking(); });
    pttBtn.addEventListener("pointercancel", () => stopTalking());
    // 컨텍스트 메뉴(길게 눌렀을 때) 방지
    pttBtn.addEventListener("contextmenu", (e) => e.preventDefault());

    function setControlsEnabled(on) {
        pauseBtn.disabled = !on;
        quickBtns.forEach(b => b.disabled = !on);
        pttBtn.disabled = !on;
        if (!on) stopTalking(); // 컨트롤이 꺼지면(종료·일시정지) 말하기 상태도 해제
    }

    function sendQuickPhrase(text) {
        if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN || !text) return;
        ws.send(JSON.stringify({ type: "text", text: text }));
        addInstantUserBubble(text);
    }

    function addInstantUserBubble(text) {
        if (emptyState) { emptyState.remove(); emptyState = null; }
        finalizeBubbles();
        const row = document.createElement("div");
        row.className = "msg-row user";
        const group = document.createElement("div");
        group.className = "msg-group";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        group.appendChild(bubble);
        row.appendChild(group);
        chatLog.appendChild(row);
        chatLog.scrollTop = chatLog.scrollHeight;
        transcriptLog.push({
            role: "user", text: text,
            time: new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
            interrupted: false
        });
    }

    function startSession() {
        setStatus("connecting", "stConnecting");
        const d = +distSlider.value;
        const p = +powerSlider.value;
        distSlider.disabled = true;
        powerSlider.disabled = true;
        const proto = location.protocol === "https:" ? "wss://" : "ws://";
        const rpParams = (mode === "rp" && rpId)
            ? "&rp=" + encodeURIComponent(rpId) + "&style=" + encodeURIComponent(rpStyle)
            : "";
        ws = new WebSocket(proto + location.host + "/ws/live?d=" + d + "&p=" + p + "&lang=" + encodeURIComponent(uiLang || "ko") + "&name=" + encodeURIComponent(userName) + rpParams);
        ws.binaryType = "arraybuffer"; // 오디오는 바이너리 프레임 (base64 오버헤드 제거)
        ws.onopen = async () => {
            /* 상황극 세션 초기화 */
            rpSessionActive = (mode === "rp" && !!rpId);
            rpEnding = false;
            rpFinal = null;
            rpPercent = 0;
            rpStagesState = rpSessionActive && rpPlan
                ? rpPlan.stages.map(s => ({ name: s.name, native: s.native || "", done: false }))
                : [];
            progressWrap.classList.toggle("hidden", !rpSessionActive);
            if (rpSessionActive) renderProgress();
            modeFreeBtn.disabled = true;
            modeRpBtn.disabled = true;
            setStatus("idle", "stPushHint");   // 연결됨 — 버튼 눌러 말하라고 안내
            actionBtn.innerText = t("btnStop");
            actionBtn.classList.add("recording");
            isConnected = true;
            isPaused = false;
            nextPlayTime = 0;
            sessionUploaded = false;
            lastRtt = null; lastTurnSec = null; userTextAt = null;
            startPinger();
            transcriptLog = [];
            sessionStartedAt = new Date();
            exportBtn.disabled = true;
            setControlsEnabled(true);
            pauseBtn.textContent = t("btnPause");
            try {
                await initAudioCapture();
            } catch (e) {
                // 마이크 권한 거부 등 — 세션을 정리하고 알림
                console.warn("오디오 초기화 실패:", e);
                alert(t("errGeneric"));
                stopSession();
            }
        };
        ws.onmessage = (event) => {
            if (event.data instanceof ArrayBuffer) {
                // 마사마사 음성 (24kHz PCM 바이너리)
                if (userTextAt != null) {
                    // 내 발화 인식(STT) → 첫 응답 오디오까지 걸린 시간 = Gemini 쪽 지연
                    lastTurnSec = (performance.now() - userTextAt) / 1000;
                    userTextAt = null;
                    updateNetStat();
                }
                playReceivedPCM(event.data);
                if (!isPaused) setStatus("speaking", "stSpeaking");
                return;
            }
            const msg = JSON.parse(event.data);
            if (msg.type === "pong") {
                lastRtt = Math.round(performance.now() - msg.t);
                updateNetStat();
            } else if (msg.type === "user_text") {
                userTextAt = performance.now();
                appendTranscript("user", msg.text);
            } else if (msg.type === "ai_text") {
                appendTranscript("ai", msg.text);
                detectEmotion(msg.text);
            } else if (msg.type === "turn_complete") {
                finalizeBubbles();
                hamsterWrap.style.setProperty("--talk-scale", "1");
                if (!isPaused && !isTalking) setStatus("idle", "stPushHint");
            } else if (msg.type === "interrupted") {
                stopAllAudio();
                if (currentAiBubble) {
                    currentAiBubble.el.classList.add("interrupted-mark");
                    flushBubble(currentAiBubble, "ai", true);
                    currentAiBubble = null;
                }
                playSurprised();
                if (!isPaused) setStatus("listening", "stSpeakNow");
            } else if (msg.type === "progress") {
                // 기능단계 충족 → 진행 바 자동 상승 (100% 초과 허용)
                const prevDone = rpStagesState.filter(s => s.done).length;
                const prevPct = rpPercent;
                rpPercent = msg.percent || 0;
                rpStagesState = msg.stages || rpStagesState;
                renderProgress();
                const nowDone = rpStagesState.filter(s => s.done).length;
                if (rpPercent > 100 && rpPercent > prevPct) screenZap();  // 확장 중! ⚡ 화면 흔들림
                else if (nowDone > prevDone) playDing();                  // 단계 달성 🔔
            } else if (msg.type === "final_score") {
                // 종료 버튼에 대한 서버의 최종 분석 결과 — 퍼센트를 점수로 치환
                rpFinal = { percent: msg.percent || 0, score: msg.score || 0, stages: msg.stages || rpStagesState };
                rpPercent = rpFinal.percent;
                rpStagesState = rpFinal.stages;
                renderProgress();
                if (rpEnding) concludeRoleplay();
            } else if (msg.type === "error") {
                // 서버가 보내는 에러 코드를 사용자 언어로 표시
                if (msg.code === "server_full") alert(t("errFull"));
                else alert(msg.message || t("errGeneric"));
            }
        };
        ws.onclose = () => { if (rpEnding) concludeRoleplay(); else stopSession(); };
        ws.onerror = () => { if (rpEnding) concludeRoleplay(); else stopSession(); };
    }

    function stopSession() {
        isConnected = false;
        isPaused = false;
        clearInterval(pingTimer);
        updateNetStat();
        setStatus("idle", "stClosed");
        actionBtn.innerText = t("btnStart");
        actionBtn.classList.remove("recording");
        stage.classList.remove("paused");
        pauseBtn.textContent = t("btnPause");
        pauseBtn.classList.remove("pause-active");
        setControlsEnabled(false);
        distSlider.disabled = false;
        powerSlider.disabled = false;
        modeFreeBtn.disabled = false;
        modeRpBtn.disabled = false;
        stopAllAudio();
        if (workletNode) { try { workletNode.port.onmessage = null; workletNode.disconnect(); } catch (e) {} workletNode = null; }
        if (processor) { try { processor.disconnect(); } catch (e) {} processor = null; }
        // 핸들러를 먼저 떼고 닫아야 onclose → stopSession 재진입(이중 업로드)이 없음
        if (ws) { ws.onclose = null; ws.onerror = null; ws.onmessage = null; try { ws.close(); } catch (e) {} ws = null; }
        finalizeBubbles();
        exportBtn.disabled = transcriptLog.length === 0;
        // 마이크 정지·컨텍스트 종료는 녹음 마무리(비동기) 안에서 처리
        finishRecordingAndUpload();
    }

    function buildTranscriptText() {
        if (transcriptLog.length === 0) return "";
        const start = sessionStartedAt ? sessionStartedAt.toLocaleString("ko-KR") : "";
        const lines = [];
        lines.push("=====================================");
        lines.push(" 마사마사와 한국어 수다 — 대화 기록");
        lines.push(" 학습자: " + (userName || "(이름 없음)") + " / 화면 언어: " + (uiLang || "ko"));
        lines.push(" 시작 시각: " + start);
        lines.push(" 친밀도(D): " + distSlider.value + " / 지위(P): " + powerSlider.value);
        if (rpSessionActive && rpPlan) {
            lines.push(" 모드: 주제 대화(상황극)");
            lines.push(" 주제: " + rpPlan.topic_ko + " / 목적: " + rpPlan.goal_ko + " / 장소: " + rpPlan.place_ko);
            lines.push(" 역할: " + rpPlan.user_role + "(학습자) ↔ " + rpPlan.ai_role + "(마사마사) / 화계: " + rpStyle);
            const fin = rpFinal || { percent: rpPercent, score: rpPercent, stages: rpStagesState };
            lines.push(" 과업 진행률: " + fin.percent + "% → 점수: " + fin.score + "점");
            lines.push(" 기능단계: " + (fin.stages || []).map(s => (s.done ? "✓" : "✗") + s.name).join(", "));
        }
        lines.push("=====================================");
        lines.push("");
        transcriptLog.forEach(item => {
            const who = item.role === "user" ? "나" : "마사마사";
            const mark = item.interrupted ? " (말 끊김)" : "";
            lines.push("[" + item.time + "] " + who + mark + ":");
            lines.push("  " + item.text.trim());
            lines.push("");
        });
        return lines.join("\r\n");
    }

    function exportTranscript() {
        const text = buildTranscriptText();
        if (!text) return;
        // 카카오톡 인앱 브라우저(WebView)는 Blob 다운로드를 차단/무시함 — 코드 버그 아님
        if (isKakao) { alert(t("kakaoExportMsg")); return; }
        const blob = new Blob(["﻿" + text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const dd = sessionStartedAt || new Date();
        const pad = n => String(n).padStart(2, "0");
        a.href = url;
        a.download = "대화기록_" + dd.getFullYear() + pad(dd.getMonth()+1) + pad(dd.getDate()) + "_" + pad(dd.getHours()) + pad(dd.getMinutes()) + ".txt";
        a.click();
        URL.revokeObjectURL(url);
    }

    function flushBubble(bubble, role, interrupted) {
        if (bubble && bubble.text.trim()) {
            transcriptLog.push({
                role: role,
                text: bubble.text,
                time: new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
                interrupted: !!interrupted
            });
        }
    }

    function stopAllAudio() {
        activeSources.forEach(src => { try { src.stop(); } catch(e) {} });
        activeSources = [];
        nextPlayTime = 0;
    }

    function setStatus(state, key) {
        lastStatus = { state: state, key: key };
        statusText.textContent = t(key);
        headerStatus.textContent = t(key);
        statusDot.className = "dot " + (state === "connecting" ? "idle" : state);
        if (!stage.classList.contains("surprised") && !stage.classList.contains("paused")) {
            stage.classList.remove("listening", "speaking");
            if (state === "speaking") stage.classList.add("speaking");
            else if (state === "listening") stage.classList.add("listening");
        }
    }

    function playSurprised() {
        if (stage.classList.contains("paused")) return;
        stage.classList.remove("listening", "speaking");
        stage.classList.add("surprised");
        spawnEmote("❗");
        clearTimeout(surpriseTimer);
        surpriseTimer = setTimeout(() => {
            stage.classList.remove("surprised");
            stage.classList.add("listening");
        }, 900);
    }

    function detectEmotion(text) {
        const now = Date.now();
        if (now - lastEmoteAt < 2500) return;
        let emoji = null;
        if (/ㅋㅋ|하하|웃기|재밌|재미있/.test(text)) emoji = "😂";
        else if (/헐|대박|미쳤|우와/.test(text)) emoji = "✨";
        else if (/슬프|속상|힘들|아쉽|눈물/.test(text)) emoji = "💧";
        else if (/좋아|최고|짱|행복|신나/.test(text)) emoji = "💕";
        else if (/화나|짜증|서운|너무하/.test(text)) emoji = "💢";
        if (emoji) { spawnEmote(emoji); lastEmoteAt = now; }
    }

    function spawnEmote(emoji) {
        const el = document.createElement("div");
        el.className = "emote";
        el.textContent = emoji;
        el.style.left = (30 + Math.random() * 40) + "%";
        el.style.top = (12 + Math.random() * 10) + "%";
        stage.appendChild(el);
        setTimeout(() => el.remove(), 1500);
    }

    function appendTranscript(role, text) {
        if (emptyState) { emptyState.remove(); emptyState = null; }
        let current = role === "user" ? currentUserBubble : currentAiBubble;
        if (!current) {
            const row = document.createElement("div");
            row.className = "msg-row " + role;
            const group = document.createElement("div");
            group.className = "msg-group";
            if (role === "ai") {
                const profile = document.createElement("div");
                profile.className = "profile";
                const img = document.createElement("img");
                img.src = "/static/hamster.png";
                profile.appendChild(img);
                row.appendChild(profile);
                const name = document.createElement("div");
                name.className = "sender-name";
                name.textContent = "마사마사";
                group.appendChild(name);
            }
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;
            group.appendChild(bubble);
            row.appendChild(group);
            chatLog.appendChild(row);
            current = { el: bubble, text: text };
            if (role === "user") currentUserBubble = current;
            else currentAiBubble = current;
        } else {
            current.text += text;
            current.el.textContent = current.text;
        }
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function finalizeBubbles() {
        flushBubble(currentUserBubble, "user", false);
        flushBubble(currentAiBubble, "ai", false);
        currentUserBubble = null;
        currentAiBubble = null;
    }

    /* ── 마이크 캡처: AudioWorklet (구형 브라우저는 ScriptProcessor 폴백) ──
       ScriptProcessor는 deprecated + 메인스레드 부하에 취약(4096 버퍼 = ~256ms 지연).
       Worklet은 오디오 스레드에서 돌고 2048 샘플(128ms) 단위로 전송한다. */
    const CAPTURE_WORKLET_SOURCE = `
        // Gemini Live는 16kHz PCM을 요구한다. 그런데 new AudioContext({sampleRate:16000})
        // 요청을 브라우저가 무시하고 48kHz 등으로 돌리는 경우가 있다(특히 모바일).
        // 그러면 48k 샘플을 16k라고 태그해 보내게 되어 오디오가 ~3배로 늘어지고,
        // Gemini의 VAD가 "발화 끝"을 한참 뒤에야 감지 → STT가 수십 초씩 밀렸다.
        // 여기서 실제 컨텍스트 sampleRate 기준으로 16kHz로 다운샘플링해 근본 해결한다.
        class PCMCaptureProcessor extends AudioWorkletProcessor {
            constructor() {
                super();
                this.buf = new Int16Array(2048);
                this.n = 0;
                this.ratio = sampleRate / 16000; // sampleRate = 실제 컨텍스트 레이트(전역)
                this.pos = 0;                      // 블록 간 이어지는 소수 위치
            }
            push(s) {
                if (s > 1) s = 1; else if (s < -1) s = -1;
                this.buf[this.n++] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                if (this.n === this.buf.length) {
                    const out = this.buf.slice(0);
                    this.port.postMessage(out.buffer, [out.buffer]);
                    this.n = 0;
                }
            }
            process(inputs) {
                const ch = (inputs[0] && inputs[0][0]) ? inputs[0][0] : null;
                if (!ch) return true;
                if (this.ratio === 1) {
                    for (let i = 0; i < ch.length; i++) this.push(ch[i]);
                } else {
                    // 선형 보간 다운샘플 (16kHz로)
                    while (this.pos < ch.length) {
                        const i0 = Math.floor(this.pos);
                        const frac = this.pos - i0;
                        const s0 = ch[i0];
                        const s1 = (i0 + 1 < ch.length) ? ch[i0 + 1] : ch[i0];
                        this.push(s0 + (s1 - s0) * frac);
                        this.pos += this.ratio;
                    }
                    this.pos -= ch.length; // 남은 소수 위치를 다음 블록으로 이월
                }
                return true;
            }
        }
        registerProcessor("pcm-capture", PCMCaptureProcessor);
    `;

    function sendPcmChunk(u8) {
        // push-to-talk: 버튼을 누르고 있는 동안(isTalking)에만 오디오를 보낸다.
        // 안 누르면 마이크는 돌지만 전송 안 함 → 불필요한 업로드·오탐 없음.
        if (!isConnected || isPaused || !isTalking || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(u8); // 바이너리 프레임 전송 — base64/JSON 인코딩 오버헤드 없음
    }

    async function initAudioCapture() {
        const AC = window.AudioContext || window.webkitAudioContext;
        captureCtx = new AC({ sampleRate: 16000 });
        // 재생 전용 24kHz 컨텍스트 — Gemini 응답(24kHz)을 리샘플링 없이 1:1 재생
        try { playbackCtx = new AC({ sampleRate: 24000 }); }
        catch (e) { playbackCtx = new AC(); }
        if (playbackCtx.sampleRate !== 24000) {
            console.warn("재생 컨텍스트가 24kHz가 아님(" + playbackCtx.sampleRate + "Hz) — 브라우저가 리샘플링합니다");
        }
        nextPlayTime = 0;
        mediaStream = await navigator.mediaDevices.getUserMedia({
            // 에코 캔슬링·노이즈 억제·AGC — 스피커 소리가 마이크로 재유입되어
            // Gemini가 사용자 발화로 오판(오탐 인터럽트)하는 것을 줄임
            audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
        const source = captureCtx.createMediaStreamSource(mediaStream);
        let usingWorklet = false;
        if (captureCtx.audioWorklet && window.AudioWorkletNode) {
            try {
                const url = URL.createObjectURL(new Blob([CAPTURE_WORKLET_SOURCE], { type: "application/javascript" }));
                await captureCtx.audioWorklet.addModule(url);
                URL.revokeObjectURL(url);
                workletNode = new AudioWorkletNode(captureCtx, "pcm-capture", {
                    numberOfInputs: 1, numberOfOutputs: 1, outputChannelCount: [1],
                    channelCount: 1, channelCountMode: "explicit"
                });
                workletNode.port.onmessage = (e) => sendPcmChunk(new Uint8Array(e.data));
                source.connect(workletNode);
                workletNode.connect(captureCtx.destination); // 무음 출력 (그래프 활성 유지용)
                usingWorklet = true;
            } catch (e) {
                console.warn("AudioWorklet 초기화 실패 — ScriptProcessor로 폴백:", e);
                workletNode = null;
            }
        }
        if (!usingWorklet) {
            processor = captureCtx.createScriptProcessor(4096, 1, 1);
            source.connect(processor);
            processor.connect(captureCtx.destination);
            processor.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                const inRate = captureCtx.sampleRate;
                // 워크릿과 동일하게, 실제 레이트가 16kHz가 아니면 16kHz로 다운샘플
                let samples;
                if (inRate === 16000) {
                    samples = input;
                } else {
                    const ratio = inRate / 16000;
                    const outLen = Math.max(1, Math.floor(input.length / ratio));
                    samples = new Float32Array(outLen);
                    for (let i = 0; i < outLen; i++) {
                        const idx = i * ratio;
                        const i0 = Math.floor(idx);
                        const frac = idx - i0;
                        const s0 = input[i0];
                        const s1 = (i0 + 1 < input.length) ? input[i0 + 1] : input[i0];
                        samples[i] = s0 + (s1 - s0) * frac;
                    }
                }
                const pcm = new Int16Array(samples.length);
                for (let i = 0; i < samples.length; i++) {
                    const s = Math.max(-1, Math.min(1, samples[i]));
                    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                sendPcmChunk(new Uint8Array(pcm.buffer));
            };
        }
        // ★ 사용자 발화가 Gemini로 전송되지 않던 문제의 핵심 수정 ★
        //   AudioContext는 생성 직후 'suspended'로 시작할 수 있다(특히 모바일 Safari/Chrome).
        //   여기는 ws.onopen(비동기) 안이라 '대화 시작' 클릭 제스처가 이미 만료돼 자동 재개가 안 된다.
        //   suspended면 워크릿/ScriptProcessor의 process()가 아예 돌지 않아 마이크 PCM이 하나도
        //   전송되지 않는다 → 마사마사가 사용자의 말을 전혀 못 듣는 증상.
        //   getUserMedia 성공 직후이므로 명시적으로 resume()하면 캡처 그래프가 즉시 동작한다.
        try { if (captureCtx.state === "suspended") await captureCtx.resume(); }
        catch (e) { console.warn("captureCtx resume 실패:", e); }
        try { if (playbackCtx && playbackCtx.state === "suspended") await playbackCtx.resume(); }
        catch (e) {}
        console.log("[audio] captureCtx:", captureCtx.state, "sampleRate:", captureCtx.sampleRate, "(→16000 resampled)", "worklet:", usingWorklet);
        startMixedRecording();
    }

    /* ── 대화 자동 녹음: 마이크 + 마사마사 음성을 실제 타임라인대로 믹스해 1개 파일로 ──
       MediaStreamDestination에 두 소스를 연결하고 MediaRecorder로 압축 녹음(webm/mp4).
       인터럽트로 끊긴 음성은 실제 들린 만큼만 녹음된다. */
    function startMixedRecording() {
        recordedChunks = [];
        recorder = null;
        mixDest = null;
        if (!window.MediaRecorder || !playbackCtx.createMediaStreamDestination) {
            console.warn("MediaRecorder 미지원 — 음성 녹음 없이 진행 (대화 기록 txt는 저장됨)");
            return;
        }
        try {
            mixDest = playbackCtx.createMediaStreamDestination();
            playbackCtx.createMediaStreamSource(mediaStream).connect(mixDest);
            const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4;codecs=mp4a.40.2", "audio/mp4", "audio/ogg;codecs=opus"];
            recorderMime = candidates.find(m => MediaRecorder.isTypeSupported(m)) || "";
            recorder = recorderMime
                ? new MediaRecorder(mixDest.stream, { mimeType: recorderMime, audioBitsPerSecond: 48000 })
                : new MediaRecorder(mixDest.stream);
            recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
            recorder.start(1000);
        } catch (e) {
            console.warn("대화 녹음 시작 실패:", e);
            recorder = null;
            mixDest = null;
        }
    }

    function finishRecordingAndUpload() {
        // 전역을 즉시 비워서, 업로드 중에 새 세션을 시작해도 서로 간섭하지 않게 한다
        const rec = recorder, capC = captureCtx, playC = playbackCtx, stream = mediaStream;
        const chunks = recordedChunks;
        recorder = null; captureCtx = null; playbackCtx = null; mediaStream = null; mixDest = null;
        recordedChunks = [];
        const mime = (rec && rec.mimeType) || recorderMime || "audio/webm";
        const cleanup = () => {
            if (stream) stream.getTracks().forEach(tr => tr.stop());
            if (capC && capC.state !== "closed") capC.close().catch(() => {});
            if (playC && playC.state !== "closed") playC.close().catch(() => {});
        };
        const upload = () => {
            const blob = chunks.length ? new Blob(chunks, { type: mime }) : null;
            uploadRecording(blob);
        };
        if (rec && rec.state !== "inactive") {
            rec.onstop = () => { cleanup(); upload(); };
            try { rec.stop(); } catch (e) { cleanup(); upload(); }
        } else {
            cleanup();
            upload();
        }
    }

    /* ── 세션 메타데이터(대화 정보): 대화문과 함께 서버에 저장됨 ── */
    function buildSessionMeta() {
        const ended = new Date();
        return {
            name: userName,
            lang: uiLang || "ko",
            d: +distSlider.value,
            p: +powerSlider.value,
            startedAt: sessionStartedAt ? sessionStartedAt.toISOString() : null,
            endedAt: ended.toISOString(),
            durationSec: sessionStartedAt ? Math.round((ended - sessionStartedAt) / 1000) : 0,
            userTurns: transcriptLog.filter(x => x.role === "user").length,
            aiTurns: transcriptLog.filter(x => x.role === "ai").length,
            interrupts: transcriptLog.filter(x => x.interrupted).length,
            userAgent: navigator.userAgent,
            roleplay: (rpSessionActive && rpPlan) ? {
                topic: rpPlan.topic_ko, goal: rpPlan.goal_ko, place: rpPlan.place_ko,
                userRole: rpPlan.user_role, aiRole: rpPlan.ai_role, style: rpStyle,
                percent: (rpFinal || {}).percent != null ? rpFinal.percent : rpPercent,
                score: (rpFinal || {}).score != null ? rpFinal.score : rpPercent,
                stages: ((rpFinal && rpFinal.stages) || rpStagesState).map(s => ({ name: s.name, done: !!s.done })),
            } : null
        };
    }

    function appendCommonFields(fd) {
        fd.append("transcript", buildTranscriptText());
        fd.append("d", distSlider.value);
        fd.append("p", powerSlider.value);
        fd.append("name", userName);
        fd.append("meta", JSON.stringify(buildSessionMeta()));
    }

    async function uploadRecording(blob) {
        const transcriptText = buildTranscriptText();
        const hasAudio = blob && blob.size > 0;
        if (!hasAudio && !transcriptText) return;
        sessionUploaded = true; // pagehide 비콘과의 이중 전송 방지
        try {
            setFooterNote(t("upUploading"), true);
            const fd = new FormData();
            if (hasAudio) {
                const type = (blob.type || "").split(";")[0];
                const ext = type.indexOf("mp4") >= 0 ? "m4a" : type.indexOf("ogg") >= 0 ? "ogg" : type.indexOf("wav") >= 0 ? "wav" : "webm";
                fd.append("audio", blob, "recording." + ext);
            }
            appendCommonFields(fd);
            const res = await fetch("/upload-recording", { method: "POST", body: fd, keepalive: !hasAudio });
            if (!res.ok) throw new Error("HTTP " + res.status);
            setFooterNote(t("upDone"));
        } catch (e) {
            console.warn("녹음 업로드 실패:", e);
            setFooterNote(t("upFail"));
        }
    }

    /* ── 탭/앱을 그냥 닫아버린 경우의 안전망: 대화문+메타라도 비콘으로 전송 ──
       (오디오 Blob은 pagehide 시점에 조립이 안 끝나 보낼 수 없음) */
    window.addEventListener("pagehide", () => {
        if (!isConnected || sessionUploaded || transcriptLog.length === 0) return;
        sessionUploaded = true;
        finalizeBubbles();
        const fd = new FormData();
        appendCommonFields(fd);
        try { navigator.sendBeacon("/upload-recording", fd); } catch (e) {}
    });

    const chatFooterEl = document.getElementById("chatFooter");
    function setFooterNote(text, sticky) {
        clearTimeout(footerNoteTimer);
        chatFooterEl.textContent = text;
        if (!sticky) footerNoteTimer = setTimeout(() => { renderFooter(); }, 5000);
    }

    function playReceivedPCM(arrayBuffer) {
        if (!playbackCtx) return;
        const usable = arrayBuffer.byteLength - (arrayBuffer.byteLength % 2);
        if (usable < 2) return;
        const int16 = new Int16Array(arrayBuffer, 0, usable / 2);
        // 볼륨(햄스터 talk-scale)은 클라이언트가 직접 계산 — 서버 부담 제거
        let sum = 0, n = 0;
        for (let i = 0; i < int16.length; i += 8) { const s = int16[i]; sum += s * s; n++; }
        const vol = n ? Math.min(1, (Math.sqrt(sum / n) / 32768) * 4) : 0;
        hamsterWrap.style.setProperty("--talk-scale", (1 + vol * 0.06).toFixed(3));
        const buf = playbackCtx.createBuffer(1, int16.length, 24000);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < int16.length; i++) ch[i] = int16[i] / 32768.0;
        const src = playbackCtx.createBufferSource();
        src.buffer = buf;
        src.playbackRate.value = playbackRate;
        src.connect(playbackCtx.destination);
        if (mixDest) src.connect(mixDest); // 대화 녹음용 믹스에도 연결
        const now = playbackCtx.currentTime;
        const startAt = Math.max(now + 0.01, nextPlayTime);
        src.start(startAt);
        nextPlayTime = startAt + (buf.duration / playbackRate);
        activeSources.push(src);
        src.onended = () => {
            const idx = activeSources.indexOf(src);
            if (idx >= 0) activeSources.splice(idx, 1);
        };
    }

    // ── 서비스 워커 등록 (PWA 설치 요건) ──
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .catch((e) => console.warn('SW 등록 실패:', e));
        });
    }
</script>
